<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClothFlow | Manufactory Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- jsPDF for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        .matrix-container::-webkit-scrollbar { height: 6px; }
        .matrix-container::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 10px; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 20; border-right: 2px solid #e4e4e7; }
        .invoice-a4 { width: 100%; max-width: 800px; min-height: 1000px; background: white; margin: 0 auto; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); padding: 40px; }
        @media print {
            body * { visibility: hidden; }
            .invoice-a4, .invoice-a4 * { visibility: visible; }
            .invoice-a4 { position: absolute; left: 0; top: 0; width: 100%; max-width: none; box-shadow: none; padding: 20px; }
        }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-900 font-sans">

    <div id="app-root"></div>

    <script>
        // --- DATA & STATE ---
        const SIZES = Array.from({ length: 19 }, (_, i) => 20 + (i * 2));
        
        const state = {
            currentPage: 'landing',
            user: null,
            settings: {
                name: "Elite Stitch Manufactory",
                address: "123 Industrial Park, Sector 4",
                phone: "+1 (555) 982-1234",
                email: "contact@elitestitch.com",
                gst: "GSTIN123456789",
                terms: "Payment due within 30 days. Late payments subject to 2% monthly interest."
            },
            pricingModels: [
                {
                    id: 'm1',
                    name: "Standard Wholesale 2026",
                    categories: [
                        { name: "Polo Shirt", base: 15.00 },
                        { name: "Cargo Pants", base: 28.50 },
                        { name: "Cotton Hoodie", base: 32.00 }
                    ]
                },
                {
                    id: 'm2',
                    name: "Premium Collection 2026",
                    categories: [
                        { name: "Silk Blouse", base: 42.00 },
                        { name: "Wool Trousers", base: 38.50 }
                    ]
                }
            ],
            invoices: [
                { id: 'INV-1001', client: "Urban Outfitters", date: "2025-10-12", total: 4500.00 },
                { id: 'INV-1002', client: "Global Apparel", date: "2025-10-14", total: 1280.00 }
            ],
            currentInvoice: { 
                id: 'INV-' + (1000 + Math.floor(Math.random() * 9000)),
                client: "",
                date: new Date().toISOString().split('T')[0],
                items: [],
                notes: ""
            },
            newPricingModel: {
                name: "",
                categories: [{ name: "New Category", base: 0.00 }]
            }
        };

        const getPriceForSize = (base, size) => (base + ((size - 20) * 0.75)).toFixed(2);

        // --- PDF GENERATION & SHARING ---
        async function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const invoiceElement = document.getElementById('invoice-preview');
            
            // Capture the invoice as an image
            const canvas = await html2canvas(invoiceElement, {
                scale: 2,
                backgroundColor: '#ffffff'
            });
            
            const imgData = canvas.toDataURL('image/png');
            const imgWidth = 190;
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            
            doc.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);
            
            // Add footer
            const pageHeight = doc.internal.pageSize.height;
            doc.setFontSize(10);
            doc.setTextColor(100);
            doc.text('Generated by ClothFlow Manufacturing System', 105, pageHeight - 10, { align: 'center' });
            doc.text(`Document ID: ${state.currentInvoice.id}`, 105, pageHeight - 5, { align: 'center' });
            
            // Save the PDF
            doc.save(`Invoice_${state.currentInvoice.id}.pdf`);
            
            // Add to invoice history
            state.invoices.push({
                id: state.currentInvoice.id,
                client: state.currentInvoice.client || "Unnamed Client",
                date: state.currentInvoice.date,
                total: state.currentInvoice.items.reduce((sum, item) => sum + parseFloat(item.total), 0)
            });
        }

        function sharePDF() {
            const invoiceData = {
                id: state.currentInvoice.id,
                client: state.currentInvoice.client,
                date: state.currentInvoice.date,
                total: state.currentInvoice.items.reduce((sum, item) => sum + parseFloat(item.total), 0),
                items: state.currentInvoice.items
            };
            
            const shareText = `Invoice ${invoiceData.id} from ${state.settings.name}\n` +
                             `Client: ${invoiceData.client || "Unnamed Client"}\n` +
                             `Date: ${invoiceData.date}\n` +
                             `Total: $${invoiceData.total.toFixed(2)}\n\n` +
                             `Items:\n${invoiceData.items.map(item => 
                                 `${item.cat} (Size ${item.size}) x ${item.qty} = $${item.total}`
                             ).join('\n')}\n\n` +
                             `Factory Contact: ${state.settings.phone}\n` +
                             `Email: ${state.settings.email}`;
            
            if (navigator.share) {
                navigator.share({
                    title: `Invoice ${invoiceData.id}`,
                    text: shareText,
                    url: window.location.href
                }).catch(console.error);
            } else {
                // Fallback to email
                const emailSubject = `Invoice ${invoiceData.id} - ${state.settings.name}`;
                const emailBody = shareText + `\n\nDownload full PDF: [Link to be generated]`;
                window.open(`mailto:?subject=${encodeURIComponent(emailSubject)}&body=${encodeURIComponent(emailBody)}`);
            }
        }

        // --- PRICING MODEL FUNCTIONS ---
        function openNewPricingModal() {
            state.newPricingModel = {
                name: `New Model ${state.pricingModels.length + 1}`,
                categories: [{ name: "New Category", base: 0.00 }]
            };
            render();
        }

        function addNewCategory() {
            state.newPricingModel.categories.push({
                name: `Category ${state.newPricingModel.categories.length + 1}`,
                base: 0.00
            });
            render();
        }

        function removeCategory(index) {
            if (state.newPricingModel.categories.length > 1) {
                state.newPricingModel.categories.splice(index, 1);
                render();
            }
        }

        function saveNewPricingModel() {
            if (!state.newPricingModel.name.trim()) {
                alert("Please enter a model name");
                return;
            }
            
            const newModel = {
                id: 'm' + (state.pricingModels.length + 1),
                name: state.newPricingModel.name,
                categories: [...state.newPricingModel.categories]
            };
            
            state.pricingModels.push(newModel);
            state.currentPricingModelId = newModel.id;
            render();
        }

        function duplicatePricingModel(modelId) {
            const modelToDuplicate = state.pricingModels.find(m => m.id === modelId);
            if (modelToDuplicate) {
                const duplicatedModel = {
                    id: 'm' + (state.pricingModels.length + 1),
                    name: `${modelToDuplicate.name} (Copy)`,
                    categories: modelToDuplicate.categories.map(cat => ({...cat}))
                };
                state.pricingModels.push(duplicatedModel);
                state.currentPricingModelId = duplicatedModel.id;
                render();
            }
        }

        // --- APP ENGINE ---
        function navigate(page) {
            state.currentPage = page;
            render();
            if (page === 'dashboard') initCharts();
        }

        function render() {
            const root = document.getElementById('app-root');
            root.innerHTML = '';

            if (state.currentPage === 'landing') root.innerHTML = renderLanding();
            else if (state.currentPage === 'login') root.innerHTML = renderLogin();
            else if (state.currentPage === 'dashboard') root.innerHTML = renderAdmin('dashboard');
            else if (state.currentPage === 'pricing') root.innerHTML = renderAdmin('pricing');
            else if (state.currentPage === 'billing') root.innerHTML = renderAdmin('billing');
            else if (state.currentPage === 'settings') root.innerHTML = renderAdmin('settings');
        }

        // --- PUBLIC COMPONENTS ---
        function renderLanding() {
            return `
                <nav class="flex items-center justify-between px-8 py-6 bg-white border-b sticky top-0 z-50">
                    <div class="text-2xl font-black text-indigo-600 tracking-tighter">CLOTHFLOW</div>
                    <div class="flex gap-8 items-center font-medium text-zinc-600">
                        <a href="#about" class="hover:text-indigo-600">About</a>
                        <a href="#sizes" class="hover:text-indigo-600">Sizing</a>
                        <button onclick="navigate('login')" class="bg-zinc-900 text-white px-5 py-2 rounded-full text-sm">Owner Login</button>
                    </div>
                </nav>

                <section class="py-24 px-8 text-center max-w-4xl mx-auto">
                    <h1 class="text-6xl font-black tracking-tight mb-6">Industrial Grade <span class="text-indigo-600">Apparel Production.</span></h1>
                    <p class="text-xl text-zinc-500 mb-10">Supporting fashion brands with standardized manufacturing, transparent sizing, and reliable logistics.</p>
                    <div class="flex justify-center gap-4">
                        <button onclick="location.href='#sizes'" class="bg-indigo-600 text-white px-8 py-4 rounded-xl font-bold">View Production Sizes</button>
                        <button class="bg-white border px-8 py-4 rounded-xl font-bold">Request Quote</button>
                    </div>
                </section>

                <section id="sizes" class="py-20 bg-white">
                    <div class="max-w-6xl mx-auto px-8">
                        <h2 class="text-3xl font-bold mb-4">Standardized Sizing Matrix</h2>
                        <p class="text-zinc-500 mb-12">We operate on a unified 20-56 scale for all garment categories.</p>
                        <div class="grid grid-cols-3 md:grid-cols-7 lg:grid-cols-10 gap-3">
                            ${SIZES.map(s => `<div class="p-4 border rounded-lg text-center font-bold hover:bg-indigo-50 hover:border-indigo-200 transition-colors">${s}</div>`).join('')}
                        </div>
                    </div>
                </section>

                <footer class="bg-zinc-950 text-white py-16 px-8">
                    <div class="max-w-6xl mx-auto grid md:grid-cols-3 gap-12">
                        <div>
                            <div class="text-xl font-black mb-4">CLOTHFLOW</div>
                            <p class="text-zinc-400">Your offline manufacturing partner for the digital age.</p>
                        </div>
                        <div>
                            <h4 class="font-bold mb-4">Factory Location</h4>
                            <p class="text-zinc-400">${state.settings.address}</p>
                            <p class="text-zinc-400">${state.settings.phone}</p>
                        </div>
                        <div>
                            <h4 class="font-bold mb-4">Connect</h4>
                            <button class="text-green-400 font-bold border border-green-400 px-4 py-2 rounded">WhatsApp Factory</button>
                        </div>
                    </div>
                </footer>
            `;
        }

        function renderLogin() {
            return `
                <div class="min-h-screen flex items-center justify-center bg-zinc-100 p-4">
                    <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md">
                        <div class="text-center mb-8">
                            <div class="inline-block p-4 bg-indigo-50 rounded-full mb-4">🔑</div>
                            <h2 class="text-2xl font-bold">Management Access</h2>
                            <p class="text-zinc-500">Authorized personnel only</p>
                        </div>
                        <div class="space-y-4">
                            <input type="text" placeholder="Username" class="w-full px-4 py-3 rounded-lg border focus:ring-2 focus:ring-indigo-500 outline-none">
                            <input type="password" placeholder="Password" class="w-full px-4 py-3 rounded-lg border focus:ring-2 focus:ring-indigo-500 outline-none">
                            <button onclick="navigate('dashboard')" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold shadow-lg shadow-indigo-200">Sign In</button>
                        </div>
                        <button onclick="navigate('landing')" class="w-full mt-6 text-sm text-zinc-400">Back to Website</button>
                    </div>
                </div>
            `;
        }

        // --- ADMIN COMPONENTS ---
        function renderAdmin(view) {
            return `
                <div class="flex h-screen overflow-hidden">
                    <aside class="w-64 bg-zinc-950 text-zinc-400 flex flex-col shrink-0">
                        <div class="p-6 text-white font-black tracking-tighter text-xl">CLOTHFLOW</div>
                        <nav class="flex-1 p-4 space-y-2">
                            <button onclick="navigate('dashboard')" class="w-full text-left px-4 py-3 rounded-lg ${view === 'dashboard' ? 'bg-zinc-800 text-white' : 'hover:bg-zinc-900'}">📊 Dashboard</button>
                            <button onclick="navigate('pricing')" class="w-full text-left px-4 py-3 rounded-lg ${view === 'pricing' ? 'bg-zinc-800 text-white' : 'hover:bg-zinc-900'}">🏷️ Pricing Engine</button>
                            <button onclick="navigate('billing')" class="w-full text-left px-4 py-3 rounded-lg ${view === 'billing' ? 'bg-zinc-800 text-white' : 'hover:bg-zinc-900'}">🧾 Billing Center</button>
                            <button onclick="navigate('settings')" class="w-full text-left px-4 py-3 rounded-lg ${view === 'settings' ? 'bg-zinc-800 text-white' : 'hover:bg-zinc-900'}">⚙️ Settings</button>
                        </nav>
                        <div class="p-6 border-t border-zinc-800">
                            <button onclick="navigate('landing')" class="text-sm">Logout</button>
                        </div>
                    </aside>
                    <main class="flex-1 overflow-y-auto bg-zinc-50">
                        <header class="bg-white border-b px-8 py-4 flex justify-between items-center sticky top-0 z-40">
                            <h2 class="text-xl font-bold capitalize">${view}</h2>
                            <div class="flex items-center gap-3">
                                <span class="text-sm font-medium">Factory Owner</span>
                                <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center font-bold text-indigo-600">O</div>
                            </div>
                        </header>
                        <div class="p-8">
                            ${view === 'dashboard' ? renderDashboard() : ''}
                            ${view === 'pricing' ? renderPricing() : ''}
                            ${view === 'billing' ? renderBilling() : ''}
                            ${view === 'settings' ? renderSettings() : ''}
                        </div>
                    </main>
                </div>
            `;
        }

        function renderDashboard() {
            return `
                <div class="bg-indigo-50 border-l-4 border-indigo-600 p-4 mb-8">
                    <p class="text-indigo-700 text-sm"><strong>Performance Analysis:</strong> Welcome to the factory control center. Below are your synthesized production stats and revenue trends gathered from existing invoices.</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-2xl border shadow-sm">
                        <div class="text-sm text-zinc-500 mb-1">Total Pricing Models</div>
                        <div class="text-3xl font-black">${state.pricingModels.length}</div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl border shadow-sm">
                        <div class="text-sm text-zinc-500 mb-1">Active Invoices</div>
                        <div class="text-3xl font-black">${state.invoices.length}</div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl border shadow-sm">
                        <div class="text-sm text-zinc-500 mb-1">Estimated Revenue</div>
                        <div class="text-3xl font-black text-indigo-600">$${state.invoices.reduce((sum, inv) => sum + inv.total, 0).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                    </div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="bg-white p-6 rounded-2xl border shadow-sm">
                        <h4 class="font-bold mb-4">Revenue Trend (Weekly)</h4>
                        <div class="h-64"><canvas id="revChart"></canvas></div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl border shadow-sm">
                        <h4 class="font-bold mb-4">Popular Categories</h4>
                        <div class="h-64"><canvas id="catChart"></canvas></div>
                    </div>
                </div>
            `;
        }

        function initCharts() {
            const ctx1 = document.getElementById('revChart').getContext('2d');
            new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: ['W1', 'W2', 'W3', 'W4'],
                    datasets: [{ label: 'Sales', data: [12000, 19000, 3000, 11200], borderColor: '#4f46e5', tension: 0.4 }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            const ctx2 = document.getElementById('catChart').getContext('2d');
            new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: ['Polo', 'Jeans', 'Hoodie'],
                    datasets: [{ data: [45, 25, 30], backgroundColor: ['#4f46e5', '#818cf8', '#c7d2fe'] }]
                },
                options: { maintainAspectRatio: false }
            });
        }

        function renderPricing() {
            const selectedModelId = state.currentPricingModelId || state.pricingModels[0]?.id;
            const model = state.pricingModels.find(m => m.id === selectedModelId);
            
            return `
                ${renderNewPricingModelModal()}
                
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <div class="flex items-center gap-4 mb-2">
                            <select onchange="state.currentPricingModelId = this.value; render();" class="text-2xl font-bold bg-transparent border-none focus:ring-0">
                                ${state.pricingModels.map(m => `
                                    <option value="${m.id}" ${m.id === selectedModelId ? 'selected' : ''}>${m.name}</option>
                                `).join('')}
                            </select>
                            <span class="text-sm bg-indigo-100 text-indigo-800 px-2 py-1 rounded-full">${model?.categories?.length || 0} categories</span>
                        </div>
                        <p class="text-zinc-500 text-sm">Configure prices per category and size (20-56)</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="duplicatePricingModel('${selectedModelId}')" class="bg-white border px-4 py-2 rounded-lg font-bold hover:bg-zinc-50">Duplicate Model</button>
                        <button onclick="openNewPricingModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-indigo-700">+ New Model</button>
                    </div>
                </div>

                <div class="bg-white border rounded-2xl overflow-hidden shadow-sm">
                    <div class="matrix-container overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-zinc-50 border-b">
                                    <th class="sticky-col px-6 py-4 font-bold text-zinc-500 text-xs uppercase shadow-sm">Category</th>
                                    ${SIZES.map(s => `<th class="px-3 py-4 text-center text-xs font-bold text-zinc-500">${s}</th>`).join('')}
                                    <th class="sticky right-0 bg-zinc-50 px-6 py-4 text-xs font-bold text-zinc-500">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${model ? model.categories.map((cat, catIndex) => `
                                    <tr class="border-b hover:bg-zinc-50 group">
                                        <td class="sticky-col px-6 py-4 font-bold text-zinc-900 shadow-sm">${cat.name}</td>
                                        ${SIZES.map(s => `
                                            <td class="px-2 py-4">
                                                <input type="text" value="${getPriceForSize(cat.base, s)}" class="w-16 text-center text-sm border-none bg-transparent hover:bg-white focus:bg-white focus:ring-1 focus:ring-indigo-300 rounded outline-none p-1">
                                            </td>
                                        `).join('')}
                                        <td class="sticky right-0 bg-white px-6 py-4">
                                            <button onclick="alert('Edit category functionality')" class="text-indigo-600 hover:text-indigo-800 text-sm">Edit</button>
                                        </td>
                                    </tr>
                                `).join('') : `
                                    <tr>
                                        <td colspan="${SIZES.length + 2}" class="text-center py-8 text-zinc-400">No pricing model selected</td>
                                    </tr>
                                `}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderNewPricingModelModal() {
            return `
                <div id="newModelModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 ${state.newPricingModel ? '' : 'hidden'}">
                    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto">
                        <div class="p-6 border-b">
                            <div class="flex justify-between items-center">
                                <h3 class="text-xl font-bold">Create New Pricing Model</h3>
                                <button onclick="state.newPricingModel = null; render();" class="text-zinc-400 hover:text-zinc-600">✕</button>
                            </div>
                        </div>
                        
                        <div class="p-6">
                            <div class="mb-6">
                                <label class="block text-sm font-medium text-zinc-700 mb-2">Model Name</label>
                                <input 
                                    type="text" 
                                    value="${state.newPricingModel.name}"
                                    onchange="state.newPricingModel.name = this.value"
                                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none"
                                    placeholder="e.g., Winter Collection 2026"
                                >
                            </div>
                            
                            <div class="mb-6">
                                <div class="flex justify-between items-center mb-4">
                                    <h4 class="font-medium text-zinc-700">Categories</h4>
                                    <button onclick="addNewCategory()" class="text-sm text-indigo-600 hover:text-indigo-800">+ Add Category</button>
                                </div>
                                
                                <div class="space-y-4">
                                    ${state.newPricingModel.categories.map((cat, index) => `
                                        <div class="flex gap-4 items-center">
                                            <div class="flex-1">
                                                <input 
                                                    type="text" 
                                                    value="${cat.name}"
                                                    onchange="state.newPricingModel.categories[${index}].name = this.value"
                                                    class="w-full px-3 py-2 border rounded focus:ring-1 focus:ring-indigo-500 outline-none"
                                                    placeholder="Category name"
                                                >
                                            </div>
                                            <div class="w-32">
                                                <div class="relative">
                                                    <span class="absolute left-3 top-1/2 transform -translate-y-1/2 text-zinc-500">$</span>
                                                    <input 
                                                        type="number" 
                                                        value="${cat.base}"
                                                        onchange="state.newPricingModel.categories[${index}].base = parseFloat(this.value)"
                                                        class="w-full pl-8 pr-3 py-2 border rounded focus:ring-1 focus:ring-indigo-500 outline-none"
                                                        placeholder="0.00"
                                                        step="0.01"
                                                        min="0"
                                                    >
                                                </div>
                                            </div>
                                            ${state.newPricingModel.categories.length > 1 ? `
                                                <button onclick="removeCategory(${index})" class="text-red-500 hover:text-red-700">✕</button>
                                            ` : ''}
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                        
                        <div class="p-6 border-t bg-zinc-50">
                            <div class="flex justify-end gap-3">
                                <button onclick="state.newPricingModel = null; render();" class="px-4 py-2 text-zinc-600 hover:text-zinc-800">Cancel</button>
                                <button onclick="saveNewPricingModel()" class="px-6 py-2 bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700">Save Model</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderBilling() {
            return `
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                    <div class="lg:col-span-4 space-y-6">
                        <div class="bg-white p-6 rounded-2xl border shadow-sm">
                            <h4 class="font-bold mb-4">Add Bill Item</h4>
                            <div class="space-y-4">
                                <div>
                                    <label class="text-xs font-bold uppercase text-zinc-400">Select Category</label>
                                    <select id="sel-cat" class="w-full p-3 bg-zinc-50 border rounded-lg mt-1 outline-none">
                                        ${state.pricingModels.flatMap(model => 
                                            model.categories.map(c => `<option value="${c.name}" data-base="${c.base}">${model.name} - ${c.name}</option>`)
                                        ).join('')}
                                    </select>
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label class="text-xs font-bold uppercase text-zinc-400">Size</label>
                                        <select id="sel-size" class="w-full p-3 bg-zinc-50 border rounded-lg mt-1 outline-none">
                                            ${SIZES.map(s => `<option value="${s}">${s}</option>`).join('')}
                                        </select>
                                    </div>
                                    <div>
                                        <label class="text-xs font-bold uppercase text-zinc-400">Quantity</label>
                                        <input id="inp-qty" type="number" value="10" min="1" class="w-full p-3 bg-zinc-50 border rounded-lg mt-1 outline-none">
                                    </div>
                                </div>
                                <button onclick="addToInvoice()" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700">+ Add to List</button>
                            </div>
                        </div>

                        <div class="bg-white p-6 rounded-2xl border shadow-sm">
                            <h4 class="font-bold mb-4">Invoice Details</h4>
                            <div class="space-y-3 mb-6">
                                <div>
                                    <label class="text-xs font-bold uppercase text-zinc-400">Client Name</label>
                                    <input 
                                        type="text" 
                                        value="${state.currentInvoice.client}"
                                        onchange="state.currentInvoice.client = this.value; updateInvoiceUI()"
                                        placeholder="Enter client name"
                                        class="w-full p-3 bg-zinc-50 border rounded-lg mt-1 outline-none"
                                    >
                                </div>
                                <div>
                                    <label class="text-xs font-bold uppercase text-zinc-400">Invoice Notes</label>
                                    <textarea 
                                        onchange="state.currentInvoice.notes = this.value"
                                        placeholder="Additional notes..."
                                        class="w-full p-3 bg-zinc-50 border rounded-lg mt-1 outline-none h-24"
                                    >${state.currentInvoice.notes}</textarea>
                                </div>
                            </div>
                            
                            <div class="space-y-2 mb-6 border-t pt-4">
                                <div class="flex justify-between text-zinc-500"><span>Subtotal</span> <span id="val-sub">$0.00</span></div>
                                <div class="flex justify-between text-zinc-500"><span>GST (18%)</span> <span id="val-gst">$0.00</span></div>
                                <div class="flex justify-between font-bold text-lg border-t pt-2"><span>Total</span> <span id="val-total">$0.00</span></div>
                            </div>
                            
                            <div class="flex gap-3">
                                <button onclick="downloadPDF()" class="flex-1 bg-zinc-900 text-white py-3 rounded-lg font-bold hover:bg-black">Download PDF</button>
                                <button onclick="sharePDF()" class="flex-1 border border-indigo-600 text-indigo-600 py-3 rounded-lg font-bold hover:bg-indigo-50">Share</button>
                            </div>
                            <button onclick="printInvoice()" class="w-full mt-3 border py-3 rounded-lg font-bold text-sm hover:bg-zinc-50">Print Preview</button>
                        </div>
                    </div>

                    <div class="lg:col-span-8 overflow-x-auto">
                        <div class="invoice-a4" id="invoice-preview">
                            <div class="flex justify-between items-start border-b-4 border-zinc-950 pb-8 mb-8">
                                <div>
                                    <div class="text-3xl font-black mb-2">${state.settings.name}</div>
                                    <p class="text-zinc-500 text-sm max-w-xs">${state.settings.address}</p>
                                    <p class="text-zinc-500 text-sm">${state.settings.phone} | ${state.settings.email}</p>
                                    <p class="text-zinc-500 text-sm">${state.settings.gst}</p>
                                </div>
                                <div class="text-right">
                                    <div class="text-4xl font-light text-zinc-300 mb-2">INVOICE</div>
                                    <p class="font-bold"># ${state.currentInvoice.id}</p>
                                    <p class="text-zinc-500">Date: ${new Date(state.currentInvoice.date).toLocaleDateString()}</p>
                                    <p class="text-zinc-500 mt-2">Client: ${state.currentInvoice.client || "[Client Name]"}</p>
                                </div>
                            </div>
                            
                            <table class="w-full mb-12">
                                <thead class="border-b-2 border-zinc-200">
                                    <tr class="text-left text-xs font-bold text-zinc-400 uppercase tracking-widest">
                                        <th class="py-4">Item & Description</th>
                                        <th class="py-4 text-center">Size</th>
                                        <th class="py-4 text-center">Qty</th>
                                        <th class="py-4 text-right">Unit Price</th>
                                        <th class="py-4 text-right">Total</th>
                                    </tr>
                                </thead>
                                <tbody id="invoice-items">
                                    <tr>
                                        <td colspan="5" class="py-20 text-center text-zinc-300 italic">No items added to the bill yet.</td>
                                    </tr>
                                </tbody>
                            </table>
                            
                            <div class="flex justify-between mt-16">
                                <div class="w-2/3">
                                    <h4 class="font-bold mb-2">Terms & Conditions</h4>
                                    <p class="text-sm text-zinc-600">${state.settings.terms}</p>
                                    ${state.currentInvoice.notes ? `
                                        <div class="mt-4">
                                            <h4 class="font-bold mb-2">Notes</h4>
                                            <p class="text-sm text-zinc-600">${state.currentInvoice.notes}</p>
                                        </div>
                                    ` : ''}
                                </div>
                                <div class="w-1/3">
                                    <div class="border-t-2 border-zinc-300 pt-4">
                                        <div class="flex justify-between mb-2">
                                            <span class="font-bold">Subtotal:</span>
                                            <span id="pdf-sub">$0.00</span>
                                        </div>
                                        <div class="flex justify-between mb-2 text-zinc-600">
                                            <span>GST (18%):</span>
                                            <span id="pdf-gst">$0.00</span>
                                        </div>
                                        <div class="flex justify-between text-lg font-bold border-t pt-2">
                                            <span>Total:</span>
                                            <span id="pdf-total">$0.00</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="mt-16 pt-8 border-t text-center text-zinc-400 text-sm">
                                <p>Thank you for your business! • This is a computer-generated invoice</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function addToInvoice() {
            const cat = document.getElementById('sel-cat').value;
            const base = parseFloat(document.getElementById('sel-cat').selectedOptions[0].dataset.base);
            const size = parseInt(document.getElementById('sel-size').value);
            const qty = parseInt(document.getElementById('inp-qty').value);
            const unit = getPriceForSize(base, size);
            const rowTotal = (unit * qty).toFixed(2);

            state.currentInvoice.items.push({ 
                cat, 
                size, 
                qty, 
                unit, 
                total: rowTotal,
                id: Date.now() + Math.random()
            });
            updateInvoiceUI();
        }

        function updateInvoiceUI() {
            const container = document.getElementById('invoice-items');
            if (state.currentInvoice.items.length === 0) {
                container.innerHTML = `
                    <tr>
                        <td colspan="5" class="py-20 text-center text-zinc-300 italic">No items added to the bill yet.</td>
                    </tr>
                `;
            } else {
                container.innerHTML = state.currentInvoice.items.map(i => `
                    <tr class="border-b border-zinc-50 hover:bg-zinc-50">
                        <td class="py-4 font-bold text-zinc-800">${i.cat}</td>
                        <td class="py-4 text-center text-zinc-500">${i.size}</td>
                        <td class="py-4 text-center text-zinc-500">${i.qty}</td>
                        <td class="py-4 text-right text-zinc-500">$${i.unit}</td>
                        <td class="py-4 text-right font-black text-indigo-600">$${i.total}</td>
                    </tr>
                `).join('');
            }

            const subtotal = state.currentInvoice.items.reduce((a, b) => a + parseFloat(b.total), 0);
            const gst = subtotal * 0.18;
            const total = subtotal + gst;
            
            // Update side panel
            document.getElementById('val-sub').innerText = `$${subtotal.toFixed(2)}`;
            document.getElementById('val-gst').innerText = `$${gst.toFixed(2)}`;
            document.getElementById('val-total').innerText = `$${total.toFixed(2)}`;
            
            // Update PDF preview
            document.getElementById('pdf-sub').innerText = `$${subtotal.toFixed(2)}`;
            document.getElementById('pdf-gst').innerText = `$${gst.toFixed(2)}`;
            document.getElementById('pdf-total').innerText = `$${total.toFixed(2)}`;
        }

        function printInvoice() {
            window.print();
        }

        function renderSettings() {
            return `
                <div class="max-w-2xl bg-white p-8 rounded-2xl border shadow-sm">
                    <h4 class="text-xl font-bold mb-6">Factory Branding & Contact</h4>
                    <div class="space-y-6">
                        <div class="grid grid-cols-2 gap-6">
                            <div class="col-span-2">
                                <label class="text-xs font-bold uppercase text-zinc-400">Factory Legal Name</label>
                                <input type="text" value="${state.settings.name}" onchange="state.settings.name = this.value" class="w-full p-3 bg-zinc-50 border rounded-lg mt-1 outline-none focus:ring-2 focus:ring-indigo-500">
                            </div>
                            <div>
                                <label class="text-xs font-bold uppercase text-zinc-400">Public Phone</label>
                                <input type="text" value="${state.settings.phone}" onchange="state.settings.phone = this.value" class="w-full p-3 bg-zinc-50 border rounded-lg mt-1 outline-none">
                            </div>
                            <div>
                                <label class="text-xs font-bold uppercase text-zinc-400">GST Number</label>
                                <input type="text" value="${state.settings.gst}" onchange="state.settings.gst = this.value" class="w-full p-3 bg-zinc-50 border rounded-lg mt-1 outline-none">
                            </div>
                            <div>
                                <label class="text-xs font-bold uppercase text-zinc-400">Owner Email</label>
                                <input type="text" value="${state.settings.email}" onchange="state.settings.email = this.value" class="w-full p-3 bg-zinc-50 border rounded-lg mt-1 outline-none">
                            </div>
                            <div class="col-span-2">
                                <label class="text-xs font-bold uppercase text-zinc-400">Business Address</label>
                                <textarea onchange="state.settings.address = this.value" class="w-full p-3 bg-zinc-50 border rounded-lg mt-1 outline-none h-24">${state.settings.address}</textarea>
                            </div>
                            <div class="col-span-2">
                                <label class="text-xs font-bold uppercase text-zinc-400">Invoice Terms</label>
                                <textarea onchange="state.settings.terms = this.value" class="w-full p-3 bg-zinc-50 border rounded-lg mt-1 outline-none h-24">${state.settings.terms}</textarea>
                            </div>
                        </div>
                        <div class="flex justify-end gap-3 pt-4 border-t">
                            <button onclick="navigate('dashboard')" class="px-6 py-2 rounded-lg font-bold text-zinc-500 hover:text-zinc-700">Discard</button>
                            <button onclick="alert('Settings saved!'); navigate('dashboard')" class="bg-indigo-600 text-white px-8 py-2 rounded-lg font-bold hover:bg-indigo-700">Save Settings</button>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- START ---
        render();
    </script>
</body>
</html>
