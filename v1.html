<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClothFlow | Manufactory Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .matrix-container::-webkit-scrollbar { height: 6px; }
        .matrix-container::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 10px; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 20; border-right: 2px solid #e4e4e7; }
        .invoice-a4 { width: 100%; max-width: 800px; min-height: 1000px; background: white; margin: 0 auto; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); padding: 40px; }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-900 font-sans">

    <div id="app-root"></div>

    <script>
        // --- DATA & STATE ---
        const SIZES = Array.from({ length: 19 }, (_, i) => 20 + (i * 2));
        
        const state = {
            currentPage: 'landing',
            user: null,
            settings: {
                name: "Elite Stitch Manufactory",
                address: "123 Industrial Park, Sector 4",
                phone: "+1 (555) 982-1234",
                email: "contact@elitestitch.com"
            },
            pricingModels: [
                {
                    id: 'm1',
                    name: "Standard Wholesale 2026",
                    categories: [
                        { name: "Polo Shirt", base: 15.00 },
                        { name: "Cargo Pants", base: 28.50 },
                        { name: "Cotton Hoodie", base: 32.00 }
                    ]
                }
            ],
            invoices: [
                { id: 'INV-1001', client: "Urban Outfitters", date: "2025-10-12", total: 4500.00 },
                { id: 'INV-1002', client: "Global Apparel", date: "2025-10-14", total: 1280.00 }
            ],
            currentInvoice: { items: [] }
        };

        const getPriceForSize = (base, size) => (base + ((size - 20) * 0.75)).toFixed(2);

        // --- APP ENGINE ---
        function navigate(page) {
            state.currentPage = page;
            render();
            if (page === 'dashboard') initCharts();
        }

        function render() {
            const root = document.getElementById('app-root');
            root.innerHTML = '';

            if (state.currentPage === 'landing') root.innerHTML = renderLanding();
            else if (state.currentPage === 'login') root.innerHTML = renderLogin();
            else if (state.currentPage === 'dashboard') root.innerHTML = renderAdmin('dashboard');
            else if (state.currentPage === 'pricing') root.innerHTML = renderAdmin('pricing');
            else if (state.currentPage === 'billing') root.innerHTML = renderAdmin('billing');
            else if (state.currentPage === 'settings') root.innerHTML = renderAdmin('settings');
        }

        // --- PUBLIC COMPONENTS ---
        function renderLanding() {
            return `
                <nav class="flex items-center justify-between px-8 py-6 bg-white border-b sticky top-0 z-50">
                    <div class="text-2xl font-black text-indigo-600 tracking-tighter">CLOTHFLOW</div>
                    <div class="flex gap-8 items-center font-medium text-zinc-600">
                        <a href="#about" class="hover:text-indigo-600">About</a>
                        <a href="#sizes" class="hover:text-indigo-600">Sizing</a>
                        <button onclick="navigate('login')" class="bg-zinc-900 text-white px-5 py-2 rounded-full text-sm">Owner Login</button>
                    </div>
                </nav>

                <section class="py-24 px-8 text-center max-w-4xl mx-auto">
                    <h1 class="text-6xl font-black tracking-tight mb-6">Industrial Grade <span class="text-indigo-600">Apparel Production.</span></h1>
                    <p class="text-xl text-zinc-500 mb-10">Supporting fashion brands with standardized manufacturing, transparent sizing, and reliable logistics.</p>
                    <div class="flex justify-center gap-4">
                        <button onclick="location.href='#sizes'" class="bg-indigo-600 text-white px-8 py-4 rounded-xl font-bold">View Production Sizes</button>
                        <button class="bg-white border px-8 py-4 rounded-xl font-bold">Request Quote</button>
                    </div>
                </section>

                <section id="sizes" class="py-20 bg-white">
                    <div class="max-w-6xl mx-auto px-8">
                        <h2 class="text-3xl font-bold mb-4">Standardized Sizing Matrix</h2>
                        <p class="text-zinc-500 mb-12">We operate on a unified 20-56 scale for all garment categories.</p>
                        <div class="grid grid-cols-3 md:grid-cols-7 lg:grid-cols-10 gap-3">
                            ${SIZES.map(s => `<div class="p-4 border rounded-lg text-center font-bold hover:bg-indigo-50 hover:border-indigo-200 transition-colors">${s}</div>`).join('')}
                        </div>
                    </div>
                </section>

                <footer class="bg-zinc-950 text-white py-16 px-8">
                    <div class="max-w-6xl mx-auto grid md:grid-cols-3 gap-12">
                        <div>
                            <div class="text-xl font-black mb-4">CLOTHFLOW</div>
                            <p class="text-zinc-400">Your offline manufacturing partner for the digital age.</p>
                        </div>
                        <div>
                            <h4 class="font-bold mb-4">Factory Location</h4>
                            <p class="text-zinc-400">${state.settings.address}</p>
                            <p class="text-zinc-400">${state.settings.phone}</p>
                        </div>
                        <div>
                            <h4 class="font-bold mb-4">Connect</h4>
                            <button class="text-green-400 font-bold border border-green-400 px-4 py-2 rounded">WhatsApp Factory</button>
                        </div>
                    </div>
                </footer>
            `;
        }

        function renderLogin() {
            return `
                <div class="min-h-screen flex items-center justify-center bg-zinc-100 p-4">
                    <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md">
                        <div class="text-center mb-8">
                            <div class="inline-block p-4 bg-indigo-50 rounded-full mb-4">🔑</div>
                            <h2 class="text-2xl font-bold">Management Access</h2>
                            <p class="text-zinc-500">Authorized personnel only</p>
                        </div>
                        <div class="space-y-4">
                            <input type="text" placeholder="Username" class="w-full px-4 py-3 rounded-lg border focus:ring-2 focus:ring-indigo-500 outline-none">
                            <input type="password" placeholder="Password" class="w-full px-4 py-3 rounded-lg border focus:ring-2 focus:ring-indigo-500 outline-none">
                            <button onclick="navigate('dashboard')" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold shadow-lg shadow-indigo-200">Sign In</button>
                        </div>
                        <button onclick="navigate('landing')" class="w-full mt-6 text-sm text-zinc-400">Back to Website</button>
                    </div>
                </div>
            `;
        }

        // --- ADMIN COMPONENTS ---
        function renderAdmin(view) {
            return `
                <div class="flex h-screen overflow-hidden">
                    <aside class="w-64 bg-zinc-950 text-zinc-400 flex flex-col shrink-0">
                        <div class="p-6 text-white font-black tracking-tighter text-xl">CLOTHFLOW</div>
                        <nav class="flex-1 p-4 space-y-2">
                            <button onclick="navigate('dashboard')" class="w-full text-left px-4 py-3 rounded-lg ${view === 'dashboard' ? 'bg-zinc-800 text-white' : 'hover:bg-zinc-900'}">📊 Dashboard</button>
                            <button onclick="navigate('pricing')" class="w-full text-left px-4 py-3 rounded-lg ${view === 'pricing' ? 'bg-zinc-800 text-white' : 'hover:bg-zinc-900'}">🏷️ Pricing Engine</button>
                            <button onclick="navigate('billing')" class="w-full text-left px-4 py-3 rounded-lg ${view === 'billing' ? 'bg-zinc-800 text-white' : 'hover:bg-zinc-900'}">🧾 Billing Center</button>
                            <button onclick="navigate('settings')" class="w-full text-left px-4 py-3 rounded-lg ${view === 'settings' ? 'bg-zinc-800 text-white' : 'hover:bg-zinc-900'}">⚙️ Settings</button>
                        </nav>
                        <div class="p-6 border-t border-zinc-800">
                            <button onclick="navigate('landing')" class="text-sm">Logout</button>
                        </div>
                    </aside>
                    <main class="flex-1 overflow-y-auto bg-zinc-50">
                        <header class="bg-white border-b px-8 py-4 flex justify-between items-center sticky top-0 z-40">
                            <h2 class="text-xl font-bold capitalize">${view}</h2>
                            <div class="flex items-center gap-3">
                                <span class="text-sm font-medium">Factory Owner</span>
                                <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center font-bold text-indigo-600">O</div>
                            </div>
                        </header>
                        <div class="p-8">
                            ${view === 'dashboard' ? renderDashboard() : ''}
                            ${view === 'pricing' ? renderPricing() : ''}
                            ${view === 'billing' ? renderBilling() : ''}
                            ${view === 'settings' ? renderSettings() : ''}
                        </div>
                    </main>
                </div>
            `;
        }

        function renderDashboard() {
            return `
                <div class="bg-indigo-50 border-l-4 border-indigo-600 p-4 mb-8">
                    <p class="text-indigo-700 text-sm"><strong>Performance Analysis:</strong> Welcome to the factory control center. Below are your synthesized production stats and revenue trends gathered from existing invoices.</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-2xl border shadow-sm">
                        <div class="text-sm text-zinc-500 mb-1">Total Pricing Models</div>
                        <div class="text-3xl font-black">04</div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl border shadow-sm">
                        <div class="text-sm text-zinc-500 mb-1">Active Invoices</div>
                        <div class="text-3xl font-black">28</div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl border shadow-sm">
                        <div class="text-sm text-zinc-500 mb-1">Estimated Revenue</div>
                        <div class="text-3xl font-black text-indigo-600">$45,200</div>
                    </div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="bg-white p-6 rounded-2xl border shadow-sm">
                        <h4 class="font-bold mb-4">Revenue Trend (Weekly)</h4>
                        <div class="h-64"><canvas id="revChart"></canvas></div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl border shadow-sm">
                        <h4 class="font-bold mb-4">Popular Categories</h4>
                        <div class="h-64"><canvas id="catChart"></canvas></div>
                    </div>
                </div>
            `;
        }

        function initCharts() {
            const ctx1 = document.getElementById('revChart').getContext('2d');
            new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: ['W1', 'W2', 'W3', 'W4'],
                    datasets: [{ label: 'Sales', data: [12000, 19000, 3000, 11200], borderColor: '#4f46e5', tension: 0.4 }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            const ctx2 = document.getElementById('catChart').getContext('2d');
            new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: ['Polo', 'Jeans', 'Hoodie'],
                    datasets: [{ data: [45, 25, 30], backgroundColor: ['#4f46e5', '#818cf8', '#c7d2fe'] }]
                },
                options: { maintainAspectRatio: false }
            });
        }

        function renderPricing() {
            const model = state.pricingModels[0];
            return `
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h3 class="text-2xl font-bold">${model.name}</h3>
                        <p class="text-zinc-500 text-sm">Configure prices per category and size (20-56)</p>
                    </div>
                    <div class="flex gap-2">
                        <button class="bg-white border px-4 py-2 rounded-lg font-bold">Duplicate Model</button>
                        <button class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold">+ New Model</button>
                    </div>
                </div>

                <div class="bg-white border rounded-2xl overflow-hidden shadow-sm">
                    <div class="matrix-container overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-zinc-50 border-b">
                                    <th class="sticky-col px-6 py-4 font-bold text-zinc-500 text-xs uppercase shadow-sm">Category</th>
                                    ${SIZES.map(s => `<th class="px-3 py-4 text-center text-xs font-bold text-zinc-500">${s}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody>
                                ${model.categories.map(cat => `
                                    <tr class="border-b hover:bg-zinc-50 group">
                                        <td class="sticky-col px-6 py-4 font-bold text-zinc-900 shadow-sm">${cat.name}</td>
                                        ${SIZES.map(s => `
                                            <td class="px-2 py-4">
                                                <input type="text" value="${getPriceForSize(cat.base, s)}" class="w-16 text-center text-sm border-none bg-transparent hover:bg-white focus:bg-white focus:ring-1 focus:ring-indigo-300 rounded outline-none p-1">
                                            </td>
                                        `).join('')}
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderBilling() {
            return `
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                    <div class="lg:col-span-4 space-y-6">
                        <div class="bg-white p-6 rounded-2xl border shadow-sm">
                            <h4 class="font-bold mb-4">Add Bill Item</h4>
                            <div class="space-y-4">
                                <div>
                                    <label class="text-xs font-bold uppercase text-zinc-400">Select Category</label>
                                    <select id="sel-cat" class="w-full p-3 bg-zinc-50 border rounded-lg mt-1 outline-none">
                                        ${state.pricingModels[0].categories.map(c => `<option value="${c.name}" data-base="${c.base}">${c.name}</option>`).join('')}
                                    </select>
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label class="text-xs font-bold uppercase text-zinc-400">Size</label>
                                        <select id="sel-size" class="w-full p-3 bg-zinc-50 border rounded-lg mt-1 outline-none">
                                            ${SIZES.map(s => `<option value="${s}">${s}</option>`).join('')}
                                        </select>
                                    </div>
                                    <div>
                                        <label class="text-xs font-bold uppercase text-zinc-400">Quantity</label>
                                        <input id="inp-qty" type="number" value="10" class="w-full p-3 bg-zinc-50 border rounded-lg mt-1 outline-none">
                                    </div>
                                </div>
                                <button onclick="addToInvoice()" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold shadow-lg shadow-indigo-100">+ Add to List</button>
                            </div>
                        </div>

                        <div class="bg-white p-6 rounded-2xl border shadow-sm">
                            <h4 class="font-bold mb-4">Finalize Billing</h4>
                            <div class="space-y-2 mb-6">
                                <div class="flex justify-between text-zinc-500"><span>Subtotal</span> <span id="val-sub">$0.00</span></div>
                                <div class="flex justify-between font-bold text-lg"><span>Total</span> <span id="val-total">$0.00</span></div>
                            </div>
                            <button class="w-full bg-zinc-900 text-white py-3 rounded-lg font-bold mb-3">Download PDF</button>
                            <button class="w-full border py-3 rounded-lg font-bold text-sm">Save & Email Client</button>
                        </div>
                    </div>

                    <div class="lg:col-span-8 overflow-x-auto">
                        <div class="invoice-a4" id="invoice-preview">
                            <div class="flex justify-between items-start border-b-4 border-zinc-950 pb-8 mb-8">
                                <div>
                                    <div class="text-3xl font-black mb-2">${state.settings.name}</div>
                                    <p class="text-zinc-500 text-sm max-w-xs">${state.settings.address}</p>
                                    <p class="text-zinc-500 text-sm">${state.settings.phone}</p>
                                </div>
                                <div class="text-right">
                                    <div class="text-4xl font-light text-zinc-300 mb-2">INVOICE</div>
                                    <p class="font-bold"># INV-${Math.floor(Math.random()*10000)}</p>
                                    <p class="text-zinc-500">Date: ${new Date().toLocaleDateString()}</p>
                                </div>
                            </div>
                            
                            <table class="w-full mb-12">
                                <thead class="border-b-2 border-zinc-200">
                                    <tr class="text-left text-xs font-bold text-zinc-400 uppercase tracking-widest">
                                        <th class="py-4">Item & Description</th>
                                        <th class="py-4 text-center">Size</th>
                                        <th class="py-4 text-center">Qty</th>
                                        <th class="py-4 text-right">Unit</th>
                                        <th class="py-4 text-right">Total</th>
                                    </tr>
                                </thead>
                                <tbody id="invoice-items">
                                    <tr>
                                        <td colspan="5" class="py-20 text-center text-zinc-300 italic">No items added to the bill yet.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        function addToInvoice() {
            const cat = document.getElementById('sel-cat').value;
            const base = parseFloat(document.getElementById('sel-cat').selectedOptions[0].dataset.base);
            const size = parseInt(document.getElementById('sel-size').value);
            const qty = parseInt(document.getElementById('inp-qty').value);
            const unit = getPriceForSize(base, size);
            const rowTotal = (unit * qty).toFixed(2);

            state.currentInvoice.items.push({ cat, size, qty, unit, total: rowTotal });
            updateInvoiceUI();
        }

        function updateInvoiceUI() {
            const container = document.getElementById('invoice-items');
            container.innerHTML = state.currentInvoice.items.map(i => `
                <tr class="border-b border-zinc-50">
                    <td class="py-4 font-bold text-zinc-800">${i.cat}</td>
                    <td class="py-4 text-center text-zinc-500">${i.size}</td>
                    <td class="py-4 text-center text-zinc-500">${i.qty}</td>
                    <td class="py-4 text-right text-zinc-500">$${i.unit}</td>
                    <td class="py-4 text-right font-black text-indigo-600">$${i.total}</td>
                </tr>
            `).join('');

            const sum = state.currentInvoice.items.reduce((a, b) => a + parseFloat(b.total), 0).toFixed(2);
            document.getElementById('val-sub').innerText = `$${sum}`;
            document.getElementById('val-total').innerText = `$${sum}`;
        }

        function renderSettings() {
            return `
                <div class="max-w-2xl bg-white p-8 rounded-2xl border shadow-sm">
                    <h4 class="text-xl font-bold mb-6">Factory Branding & Contact</h4>
                    <div class="space-y-6">
                        <div class="grid grid-cols-2 gap-6">
                            <div class="col-span-2">
                                <label class="text-xs font-bold uppercase text-zinc-400">Factory Legal Name</label>
                                <input type="text" value="${state.settings.name}" class="w-full p-3 bg-zinc-50 border rounded-lg mt-1 outline-none focus:ring-2 focus:ring-indigo-500">
                            </div>
                            <div>
                                <label class="text-xs font-bold uppercase text-zinc-400">Public Phone</label>
                                <input type="text" value="${state.settings.phone}" class="w-full p-3 bg-zinc-50 border rounded-lg mt-1 outline-none">
                            </div>
                            <div>
                                <label class="text-xs font-bold uppercase text-zinc-400">Owner Email</label>
                                <input type="text" value="${state.settings.email}" class="w-full p-3 bg-zinc-50 border rounded-lg mt-1 outline-none">
                            </div>
                            <div class="col-span-2">
                                <label class="text-xs font-bold uppercase text-zinc-400">Business Address</label>
                                <textarea class="w-full p-3 bg-zinc-50 border rounded-lg mt-1 outline-none h-24">${state.settings.address}</textarea>
                            </div>
                        </div>
                        <div class="flex justify-end gap-3 pt-4 border-t">
                            <button class="px-6 py-2 rounded-lg font-bold text-zinc-500">Discard</button>
                            <button class="bg-indigo-600 text-white px-8 py-2 rounded-lg font-bold">Save Settings</button>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- START ---
        render();
    </script>
</body>
</html>
