        * { font-family: 'Cairo', sans-serif; }

        .card-shadow { box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); }

        @view-transition { navigation: auto; }

<body class="h-full w-full">
    <div id="app" class="h-full w-full overflow-auto"></div>
    <script>
        if (!window.dataSdk) {
            window.dataSdk = {
                init: async (handler) => {
                    window._dataHandler = handler;
                    let data = JSON.parse(localStorage.getItem('app_data') || '[]');
                    if (!data.some(d => d.type === 'pricingModel')) {
                        const SIZES = []; for (let i = 22; i <= 56; i += 2) SIZES.push(i);
                        const createCategory = (name, priceMap) => ({ name, prices: SIZES.map(s => ({ size: s, price: priceMap[s] || 0 })) });
                        const seedModels = [
                            { name: "A", data: [createCategory("سليب", { 26: 160, 28: 180, 30: 200, 32: 225, 34: 250, 36: 275, 38: 300, 40: 325, 42: 355, 44: 385, 46: 420, 48: 460, 50: 500, 52: 540, 54: 580, 56: 620 }), createCategory("نصف كم", { 22: 220, 24: 250, 26: 280, 28: 315, 30: 350, 32: 385, 34: 420, 36: 455, 38: 490, 40: 525, 42: 560, 44: 600, 46: 650, 48: 700, 50: 755, 52: 810, 54: 865, 56: 920 }), createCategory("شورت", { 26: 205, 28: 235, 30: 265, 32: 300, 34: 335, 36: 370, 38: 405, 40: 440, 42: 485, 44: 530, 46: 575, 48: 625, 50: 675, 52: 725, 54: 775, 56: 825 }), createCategory("حماله", { 22: 200, 24: 220, 26: 245, 28: 270, 30: 295, 32: 320, 34: 345, 36: 370, 38: 395, 40: 420, 42: 445, 44: 470, 46: 500, 48: 540, 50: 580, 52: 625, 54: 670, 56: 715 })] },
                            { name: "B", data: [createCategory("سليب", { 44: 365, 46: 400, 48: 435, 50: 475, 52: 515, 54: 555, 56: 595 }), createCategory("نصف كم", { 44: 580, 46: 625, 48: 675, 50: 730, 52: 785, 54: 845, 56: 905 }), createCategory("شورت", { 44: 505, 46: 555, 48: 605, 50: 655, 52: 705, 54: 755, 56: 805 }), createCategory("حماله", { 44: 450, 46: 480, 48: 520, 50: 560, 52: 605, 54: 650, 56: 695 })] },
                            { name: "C", data: [createCategory("سليب", { 26: 150, 28: 170, 30: 195, 32: 220, 34: 245, 36: 270, 38: 295, 40: 320, 42: 345, 44: 370, 46: 400, 48: 435, 50: 475, 52: 515, 54: 555, 56: 595 }), createCategory("نصف كم", { 22: 210, 24: 240, 26: 270, 28: 305, 30: 340, 32: 375, 34: 410, 36: 445, 38: 480, 40: 515, 42: 550, 44: 585, 46: 625, 48: 680, 50: 735, 52: 790, 54: 845, 56: 900 }), createCategory("شورت", { 26: 210, 28: 240, 30: 270, 32: 300, 34: 330, 36: 360, 38: 390, 40: 420, 42: 450, 44: 500, 46: 550, 48: 600, 50: 650, 52: 700, 54: 750, 56: 800 }), createCategory("حماله", { 22: 185, 24: 205, 26: 230, 28: 255, 30: 280, 32: 305, 34: 330, 36: 355, 38: 380, 40: 405, 42: 430, 44: 455, 46: 480, 48: 520, 50: 560, 52: 600, 54: 645, 56: 690 })] },
                            { name: "D", data: [createCategory("كلسون", { 22: 205, 24: 235, 26: 265, 28: 295, 30: 325, 32: 355, 34: 390, 36: 425, 38: 460 }), createCategory("كم", { 22: 260, 24: 285, 26: 315, 28: 345, 30: 390, 32: 435, 34: 480, 36: 530, 38: 580 })] },
                            { name: "طقم دفاية", data: [createCategory("المجموع", { 28: 60, 30: 70, 32: 80, 34: 90, 36: 100, 38: 110, 40: 120, 42: 130, 44: 140, 46: 180, 48: 190, 50: 200, 52: 210, 54: 220, 56: 230 }), createCategory("كلسون", { 28: 25, 30: 30, 32: 35, 34: 40, 36: 45, 38: 50, 40: 55, 42: 60, 44: 65, 46: 85, 48: 90, 50: 95, 52: 100, 54: 105, 56: 110 }), createCategory("كم", { 28: 35, 30: 40, 32: 45, 34: 50, 36: 55, 38: 60, 40: 65, 42: 70, 44: 75, 46: 95, 48: 100, 50: 105, 52: 110, 54: 115, 56: 120 })] }
                        ];
                        data = [...data, ...seedModels.map((m, i) => ({ type: 'pricingModel', pricingModelName: m.name, pricingModelData: JSON.stringify(m.data), createdAt: new Date().toISOString(), __backendId: 'seed_' + i }))];
                        localStorage.setItem('app_data', JSON.stringify(data));
                    }
                    handler.onDataChanged(data);
                    return { isOk: true };
                },
                create: async (item) => {
                    const data = JSON.parse(localStorage.getItem('app_data') || '[]');
                    const newItem = { ...item, __backendId: Date.now().toString() };
                    data.push(newItem);
                    localStorage.setItem('app_data', JSON.stringify(data));
                    if (window._dataHandler) window._dataHandler.onDataChanged(data);
                    return { isOk: true, id: newItem.__backendId };
                },
                update: async (item) => {
                    const data = JSON.parse(localStorage.getItem('app_data') || '[]');
                    const index = data.findIndex(d => d.__backendId === item.__backendId);
                    if (index >= 0) { data[index] = item; localStorage.setItem('app_data', JSON.stringify(data)); if (window._dataHandler) window._dataHandler.onDataChanged(data); return { isOk: true }; }
                    return { isOk: false };
                },
                delete: async (item) => {
                    let data = JSON.parse(localStorage.getItem('app_data') || '[]');
                    data = data.filter(d => d.__backendId !== item.__backendId);
                    localStorage.setItem('app_data', JSON.stringify(data));
                    if (window._dataHandler) window._dataHandler.onDataChanged(data);
                    return { isOk: true };
                }
            };
        }

        const defaultConfig = {
            company_name: "مصنع الذهب الأبيض للملابس", tagline: "جودة عالية وأسعار منافسة",
            primary_color: "#667eea", secondary_color: "#764ba2", accent_color: "#48bb78",
            background_color: "#f7fafc", text_color: "#2d3748", font_family: "Cairo", font_size: 16
        };

        let appState = {
            currentView: 'dashboard', isSidebarOpen: false,
            companySettings: { name: "مصنع الذهب الأبيض للملابس", phone: "+201212813475", address: "العاشر من رمضان، الشرقية", footer: "شكراً لتعاملكم معنا" },
            pricingModels: [], bills: [], categories: ["سليب", "نصف كم", "شورت", "حماله", "كلسون", "كم", "المجموع"],
            selectedModel: null, editingModel: null, viewingModel: null, billItems: [], currentBill: null, editingBillId: null, lastBillInput: null,
            currentBillClientName: '',
            billStep: 'selectModel',
            loadingStates: {}, settings: null
        };

        const SIZES = (() => { const s = []; for (let i = 22; i <= 56; i += 2) s.push(i); return s; })();

        const dataHandler = {
            onDataChanged(data) {
                const settings = data.find(d => d.type === 'settings');
                if (settings) { appState.settings = settings; appState.companySettings = { name: settings.companyName || appState.companySettings.name, phone: settings.companyPhone || appState.companySettings.phone, address: settings.companyAddress || appState.companySettings.address, footer: settings.companyFooter || appState.companySettings.footer }; }
                appState.pricingModels = data.filter(d => d.type === 'pricingModel').map(m => ({ ...m, data: JSON.parse(m.pricingModelData) }));
                appState.bills = data.filter(d => d.type === 'bill').map(b => {
                    const bill = { ...b, items: JSON.parse(b.billItems) };
                    if (!bill.hasOwnProperty('billClientName')) bill.billClientName = '';
                    return bill;
                });
                render();
            }
        };

        function escapeHtml(text) { if (text === null || text === undefined) return ''; return String(text).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }
        function setLoading(key, isLoading) { appState.loadingStates[key] = isLoading; render(); }
        function isLoading(key) { return appState.loadingStates[key] || false; }
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-lg shadow-lg text-white z-50 fade-in ${type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500'}`;
            toast.textContent = message; document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s ease'; setTimeout(() => toast.remove(), 300); }, 3000);
        }
        function toggleSidebar() { appState.isSidebarOpen = !appState.isSidebarOpen; render(); }
        function getCategoryIcon(category) { const icons = { 'سليب': '🩲', 'نصف كم': '👕', 'شورت': '🩳', 'حماله': '🏃', 'كلسون': '🩲', 'كم': '👕', 'المجموع': '🧮' }; return icons[category] || '👔'; }

        function triggerFileInput() { document.getElementById('excelFileInput').click(); }
        async function importFromExcel(event) {
            const file = event.target.files[0];
            if (!file) return;
            setLoading('importExcel', true);
            try {
                const data = await file.arrayBuffer();
                const workbook = XLSX.read(data, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                const sheet = workbook.Sheets[sheetName];
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                if (rows.length < 2) throw new Error('الملف فارغ أو لا يحتوي على بيانات');
                let headerRowIndex = -1, sizeColIndex = -1;
                const categoryMap = new Map();
                for (let i = 0; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row) continue;
                    const sizeIdx = row.findIndex(cell => cell && cell.toString().trim() === 'المقاس');
                    if (sizeIdx !== -1) {
                        headerRowIndex = i; sizeColIndex = sizeIdx;
                        for (let j = 0; j < row.length; j++) {
                            if (j === sizeIdx) continue;
                            let catName = row[j]?.toString().trim();
                            if (!catName) continue;
                            if (catName === 'نصفكم') catName = 'نصف كم';
                            if (catName === 'سبور') catName = 'حماله';
                            categoryMap.set(j, catName);
                        }
                        break;
                    }
                }
                if (headerRowIndex === -1) throw new Error('لم يتم العثور على صف الرأس الذي يحتوي على "المقاس"');
                const modelData = [];
                const categoryNames = Array.from(categoryMap.values());
                for (let catName of categoryNames) {
                    modelData.push({ name: catName, prices: SIZES.map(s => ({ size: s, price: 0 })) });
                }
                for (let i = headerRowIndex + 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row || row.length === 0) continue;
                    const sizeCell = row[sizeColIndex];
                    if (sizeCell === undefined || sizeCell === null) continue;
                    const size = parseInt(sizeCell);
                    if (isNaN(size) || !SIZES.includes(size)) continue;
                    for (let [colIdx, catName] of categoryMap.entries()) {
                        const priceCell = row[colIdx];
                        if (priceCell === undefined || priceCell === null || priceCell === '------' || priceCell === '') continue;
                        const price = parseFloat(priceCell);
                        if (isNaN(price)) continue;
                        const catData = modelData.find(c => c.name === catName);
                        if (catData) { const priceEntry = catData.prices.find(p => p.size === size); if (priceEntry) priceEntry.price = price; }
                    }
                }
                let modelName = file.name.replace(/\.[^/.]+$/, "");
                modelName = prompt("أدخل اسم النموذج:", modelName);
                if (!modelName || !modelName.trim()) { setLoading('importExcel', false); return; }
                const result = await window.dataSdk.create({ type: 'pricingModel', pricingModelName: modelName.trim(), pricingModelData: JSON.stringify(modelData), createdAt: new Date().toISOString() });
                showToast(result.isOk ? 'تم استيراد النموذج بنجاح' : 'حدث خطأ أثناء حفظ النموذج', result.isOk ? 'success' : 'error');
            } catch (err) {
                console.error(err);
                showToast('خطأ في قراءة الملف: ' + err.message, 'error');
            } finally {
                setLoading('importExcel', false);
                event.target.value = '';
                render();
            }
        }

        async function createPricingModel(e) {
            e.preventDefault();
            const name = document.getElementById('modelName').value;
            if (!name.trim()) return showToast('الرجاء إدخال اسم النموذج', 'error');
            setLoading('createModel', true);
            const modelData = appState.categories.map(category => ({ name: category, prices: SIZES.map(size => ({ size, price: 0 })) }));
            const result = await window.dataSdk.create({ type: 'pricingModel', pricingModelName: name, pricingModelData: JSON.stringify(modelData), createdAt: new Date().toISOString() });
            if (result.isOk) { document.getElementById('modelName').value = ''; showToast('تم إنشاء النموذج بنجاح', 'success'); }
            else { showToast('حدث خطأ أثناء الإنشاء', 'error'); }
            setLoading('createModel', false);
        }

        async function updatePricingModel(model) {
            setLoading('updateModel', true);
            const result = await window.dataSdk.update({ ...model, pricingModelData: JSON.stringify(model.data) });
            if (result.isOk) { appState.editingModel = null; showToast('تم تحديث النموذج بنجاح', 'success'); }
            else { showToast('حدث خطأ أثناء التحديث', 'error'); }
            setLoading('updateModel', false);
        }

        async function deletePricingModel(model) {
            const modelId = model.__backendId;
            const confirmBtn = document.getElementById(`confirm-${modelId}`);
            if (confirmBtn && confirmBtn.style.display !== 'none') {
                setLoading(`delete-${modelId}`, true);
                const result = await window.dataSdk.delete(model);
                if (result.isOk) { showToast('تم حذف النموذج بنجاح', 'success'); appState.pricingModels = appState.pricingModels.filter(m => m.__backendId !== modelId); render(); }
                else { showToast('حدث خطأ أثناء الحذف', 'error'); }
                setLoading(`delete-${modelId}`, false);
            } else {
                const deleteBtn = document.getElementById(`delete-${modelId}`);
                if (deleteBtn) deleteBtn.style.display = 'none';
                if (confirmBtn) { confirmBtn.style.display = 'inline-flex'; setTimeout(() => { confirmBtn.style.display = 'none'; if (deleteBtn) deleteBtn.style.display = 'inline-flex'; }, 5000); }
            }
        }

        function editModel(model) { appState.editingModel = JSON.parse(JSON.stringify(model)); render(); }
        function updatePrice(categoryIndex, sizeIndex, price) { if (appState.editingModel) { appState.editingModel.data[categoryIndex].prices[sizeIndex].price = parseFloat(price) || 0; } }
        function saveModelEdits() { if (appState.editingModel) updatePricingModel(appState.editingModel); }
        function cancelEdit() { appState.editingModel = null; render(); }
        function fillAllPrices() {
            const price = parseFloat(document.getElementById('quickFillPrice').value);
            if (!price || price <= 0) return showToast('الرجاء إدخال سعر صحيح', 'error');
            if (appState.editingModel) { appState.editingModel.data.forEach(cat => cat.prices.forEach(p => p.price = price)); render(); }
        }
        function clearAllPrices() { if (appState.editingModel) { appState.editingModel.data.forEach(cat => cat.prices.forEach(p => p.price = 0)); render(); } }
        async function duplicateModel(modelId) {
            const model = appState.pricingModels.find(m => m.__backendId === modelId);
            if (!model) return;
            setLoading('duplicateModel', true);
            const result = await window.dataSdk.create({ type: 'pricingModel', pricingModelName: `${model.pricingModelName} (نسخة)`, pricingModelData: model.pricingModelData, createdAt: new Date().toISOString() });
            showToast(result.isOk ? 'تم نسخ النموذج بنجاح' : 'حدث خطأ أثناء النسخ', result.isOk ? 'success' : 'error');
            setLoading('duplicateModel', false);
        }
        function viewModelDetails(modelId) {
            const model = appState.pricingModels.find(m => m.__backendId === modelId);
            if (model) { appState.viewingModel = model; appState.currentView = 'viewModel'; render(); }
        }

        function startNewBill() {
            appState.currentView = 'newBill';
            appState.billItems = [];
            appState.selectedModel = null;
            appState.editingBillId = null;
            appState.lastBillInput = null;
            appState.currentBillClientName = '';
            appState.billStep = 'selectModel';
            render();
        }

        function selectModelForBill(modelId) {
            appState.selectedModel = appState.pricingModels.find(m => m.__backendId === modelId);
            appState.billStep = 'clientName';
            render();
        }

        function confirmClientName() {
            const input = document.getElementById('billClientName');
            appState.currentBillClientName = input ? input.value.trim() : '';
            appState.billStep = 'items';
            render();
        }

        function backToModelSelect() {
            appState.selectedModel = null;
            appState.billStep = 'selectModel';
            render();
        }

        function backToClientName() {
            appState.billStep = 'clientName';
            render();
        }

        function cancelNewBill() {
            appState.currentView = 'bills';
            appState.lastBillInput = null;
            appState.editingBillId = null;
            appState.currentBillClientName = '';
            appState.selectedModel = null;
            appState.billStep = 'selectModel';
            render();
        }

        function editBill() {
            if (!appState.currentBill) return;
            const bill = appState.currentBill;
            appState.editingBillId = bill.__backendId;
            appState.billItems = JSON.parse(JSON.stringify(bill.items));
            appState.currentBillClientName = bill.billClientName || '';
            appState.currentView = 'newBill';
            const model = appState.pricingModels.find(m => m.__backendId === bill.billModelId);
            if (model) appState.selectedModel = model;
            appState.billStep = 'items';
            render();
        }

        function addBillItem() {
            const category = document.getElementById('billCategory').value;
            const size = parseInt(document.getElementById('billSize').value);
            const quantity = parseFloat(document.getElementById('billQuantity').value);
            if (!category || !size || !quantity) return showToast('الرجاء تعبئة جميع الحقول', 'error');
            const categoryData = appState.selectedModel.data.find(c => c.name === category);
            const priceData = categoryData.prices.find(p => p.size === size);
            const unitPrice = priceData.price;
            const total = unitPrice * quantity;
            appState.billItems.push({ category, size, quantity, unitPrice, total });
            const nextSize = size + 2 <= 56 ? size + 2 : size;
            appState.lastBillInput = { category, size: nextSize, quantity };
            render();
        }

        function removeBillItem(index) { appState.billItems.splice(index, 1); render(); }

        async function saveBill() {
            if (appState.billItems.length === 0) return showToast('الرجاء إضافة عناصر للفاتورة', 'error');
            setLoading('saveBill', true);
            const billTotal = appState.billItems.reduce((sum, item) => sum + item.total, 0);
            let result;
            if (appState.editingBillId) {
                const originalBill = appState.bills.find(b => b.__backendId === appState.editingBillId);
                result = await window.dataSdk.update({ ...originalBill, billItems: JSON.stringify(appState.billItems), billTotal, billClientName: appState.currentBillClientName });
            } else {
                const billNumber = `INV-${Date.now()}`;
                result = await window.dataSdk.create({ type: 'bill', billNumber, billDate: new Date().toISOString(), billModelId: appState.selectedModel.__backendId, billItems: JSON.stringify(appState.billItems), billTotal, billClientName: appState.currentBillClientName, createdAt: new Date().toISOString() });
            }
            if (result.isOk) {

        async function shareBill() {
            const element = document.getElementById('printable-bill');
            const container = document.getElementById('view-bill-container');
            if (!container) { showToast('خطأ: لم يتم العثور على حاوية الفاتورة', 'error'); return; }
            setLoading('sharing', true);
            container.classList.add('pdf-capture-mode');
            const opt = { margin: 10, filename: `invoice_${appState.currentBill.billNumber}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
            try {
                const pdfBlob = await html2pdf().set(opt).from(element).outputPdf('blob');
                if (navigator.share && navigator.canShare && navigator.canShare({ files: [new File([pdfBlob], opt.filename, { type: 'application/pdf' })] })) {
                    const file = new File([pdfBlob], opt.filename, { type: 'application/pdf' });
                    await navigator.share({ title: `فاتورة ${appState.currentBill.billNumber}`, text: `فاتورة من ${appState.companySettings.name}`, files: [file] });
                    showToast('تم فتح نافذة المشاركة', 'success');
                } else {
                    const url = URL.createObjectURL(pdfBlob);
                    const a = document.createElement('a'); a.href = url; a.download = opt.filename; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
                    showToast('مشاركة الملفات غير مدعومة، تم تنزيل PDF بدلاً من ذلك', 'info');
                }
            } catch (error) {
                if (error.name !== 'AbortError') { console.error('PDF sharing error:', error); showToast('حدث خطأ أثناء إنشاء أو مشاركة PDF', 'error'); }
            } finally { container.classList.remove('pdf-capture-mode'); setLoading('sharing', false); }
        }

        async function downloadBillPDF() {
            const element = document.getElementById('printable-bill');
            const container = document.getElementById('view-bill-container');
            if (!container) { showToast('خطأ: لم يتم العثور على حاوية الفاتورة', 'error'); return; }
            setLoading('downloading', true);
            container.classList.add('pdf-capture-mode');
            const opt = { margin: 10, filename: `invoice_${appState.currentBill.billNumber}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };

                        <div id="billsList" class="card-shadow rounded-xl p-6 bg-white">
                            <div class="overflow-x-auto"><table class="w-full"><thead><tr class="border-b-2" style="border-color: ${config.primary_color};"><th class="text-right py-3 px-4">رقم الفاتورة</th><th class="text-right py-3 px-4">التاريخ</th><th class="text-right py-3 px-4">العميل</th><th class="text-right py-3 px-4">عدد العناصر</th><th class="text-right py-3 px-4">المبلغ الإجمالي</th><th class="text-center py-3 px-4">الإجراءات</th></tr></thead>
                            <tbody>${sortedBills.map(bill => `<tr class="bill-row border-b" data-bill-number="${bill.billNumber}"><td class="py-3 px-4 font-semibold" style="color: ${config.primary_color};">${bill.billNumber}</td><td class="py-3 px-4">${new Date(bill.billDate).toLocaleDateString('ar-SA')}</td><td class="py-3 px-4">${bill.billClientName ? 'أ/ ' + escapeHtml(bill.billClientName) : '-'}</td><td class="py-3 px-4">${bill.items.length}</td><td class="py-3 px-4 font-bold" style="color: ${config.accent_color};">${bill.billTotal.toFixed(2)} جنية</td><td class="py-3 px-4 text-center"><div class="flex gap-2 justify-center"><button onclick="viewBill(appState.bills.find(b => b.__backendId === '${bill.__backendId}'));" class="px-4 py-2 rounded-lg font-semibold text-white" style="background-color: ${config.primary_color};">عرض</button><button onclick="deleteBill(appState.bills.find(b => b.__backendId === '${bill.__backendId}'));" ${isLoading(`delete-bill-${bill.__backendId}`) ? 'disabled' : ''} class="px-4 py-2 bg-red-500 rounded-lg font-semibold text-white flex items-center gap-2">${isLoading(`delete-bill-${bill.__backendId}`) ? '<div class="loading-spinner"></div>' : ''}<span>حذف</span></button><button id="confirm-bill-${bill.__backendId}" onclick="deleteBill(appState.bills.find(b => b.__backendId === '${bill.__backendId}'));" style="display: none;" class="px-4 py-2 bg-red-700 rounded-lg font-semibold text-white">تأكيد</button></div></td></tr>`).join('')}</tbody></table></div>
                        </div>`}
                </div>`;
        }

        function renderNewBill() {
            const config = window.elementSdk?.config || defaultConfig;
            const lastInput = appState.lastBillInput || {};
            const isEditing = !!appState.editingBillId;

            const stepsBar = `
                <div class="flex items-center justify-center gap-2 md:gap-4 mb-8 no-print">
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center text-white font-bold text-sm md:text-base ${appState.billStep === 'selectModel' ? 'ring-4 ring-offset-2' : ''}" style="background-color: ${appState.billStep === 'selectModel' || appState.billStep === 'clientName' || appState.billStep === 'items' ? config.primary_color : '#cbd5e0'};">1</div>
                        <span class="font-semibold text-sm md:text-base hidden sm:inline" style="color: ${appState.billStep === 'selectModel' ? config.primary_color : '#a0aec0'};">نموذج التسعير</span>
                    </div>
                    <div class="w-8 md:w-16 h-0.5 rounded" style="background-color: ${appState.billStep !== 'selectModel' ? config.primary_color : '#cbd5e0'};"></div>
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center text-white font-bold text-sm md:text-base ${appState.billStep === 'clientName' ? 'ring-4 ring-offset-2' : ''}" style="background-color: ${appState.billStep === 'clientName' || appState.billStep === 'items' ? config.primary_color : '#cbd5e0'};">2</div>
                        <span class="font-semibold text-sm md:text-base hidden sm:inline" style="color: ${appState.billStep === 'clientName' ? config.primary_color : '#a0aec0'};">اسم العميل</span>
                    </div>
                    <div class="w-8 md:w-16 h-0.5 rounded" style="background-color: ${appState.billStep === 'items' ? config.primary_color : '#cbd5e0'};"></div>
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center text-white font-bold text-sm md:text-base ${appState.billStep === 'items' ? 'ring-4 ring-offset-2' : ''}" style="background-color: ${appState.billStep === 'items' ? config.primary_color : '#cbd5e0'};">3</div>
                        <span class="font-semibold text-sm md:text-base hidden sm:inline" style="color: ${appState.billStep === 'items' ? config.primary_color : '#a0aec0'};">العناصر</span>
                    </div>
                </div>`;

            const cancelButton = `<button onclick="cancelNewBill();" class="px-6 py-3 bg-gray-300 rounded-lg font-semibold hover:bg-gray-400">إلغاء</button>`;

            let content = '';

            if (appState.billStep === 'selectModel') {
                content = `
                    <div class="card-shadow rounded-xl p-6 bg-white"><h2 class="text-2xl font-bold mb-6" style="color: ${config.text_color};">اختر نموذج التسعير</h2>
                        ${appState.pricingModels.length === 0 ? `<div class="text-center py-12"><div class="text-6xl mb-4">💰</div><p class="text-xl mb-4">لا توجد نماذج تسعير متاحة</p><button onclick="appState.currentView = 'pricing'; render();" class="px-6 py-3 rounded-lg font-semibold text-white" style="background-color: ${config.primary_color};">إنشاء نموذج تسعير</button></div>` : `
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">${appState.pricingModels.map(model => `<button onclick="selectModelForBill('${model.__backendId}');" class="card-shadow rounded-lg p-6 text-right hover-scale bg-white border-2" style="border-color: ${config.primary_color}; border-opacity: 0.3;"><h3 class="text-xl font-bold mb-2">${escapeHtml(model.pricingModelName)}</h3><p class="text-sm opacity-75">${model.data.length} فئات متاحة</p></button>`).join('')}</div>`}
                    </div>`;
            } else if (appState.billStep === 'clientName') {
                content = `
                    <div class="card-shadow rounded-xl p-6 bg-white max-w-lg mx-auto">
                        <div class="text-center mb-6">
                            <div class="w-20 h-20 rounded-full mx-auto mb-4 flex items-center justify-center" style="background-color: ${config.background_color};"><span class="text-4xl">👤</span></div>
                            <h2 class="text-2xl font-bold mb-2" style="color: ${config.text_color};">اسم العميل</h2>
                            <p class="opacity-75">أدخل اسم العميل ثم اضغط متابعة</p>
                        </div>
                        <div class="mb-6">
                            <label class="block text-sm font-semibold mb-2">اسم العميل</label>
                            <input type="text" id="billClientName" value="${escapeHtml(appState.currentBillClientName)}" placeholder="أدخل اسم العميل (اختياري)" class="w-full px-4 py-4 border-2 rounded-lg text-lg" style="border-color: ${config.primary_color};" onkeydown="if(event.key==='Enter') confirmClientName();">
                        </div>
                        <div class="flex gap-3">
                            <button onclick="backToModelSelect();" class="flex-1 px-6 py-3 bg-gray-300 rounded-lg font-semibold hover:bg-gray-400">رجوع</button>
                            <button onclick="confirmClientName();" class="flex-1 px-6 py-3 rounded-lg font-semibold text-white text-lg" style="background-color: ${config.primary_color};">متابعة</button>
                        </div>
                    </div>`;
            } else if (appState.billStep === 'items') {
                content = `
                    <div class="space-y-6">
                        <div class="card-shadow rounded-xl p-6 bg-white"><h2 class="text-2xl font-bold mb-4">إضافة عنصر</h2>
                            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                                <select id="billCategory" class="px-4 py-3 border-2 rounded-lg" style="border-color: ${config.primary_color};">${appState.selectedModel.data.map(cat => `<option value="${cat.name}" ${lastInput.category === cat.name ? 'selected' : ''}>${cat.name}</option>`).join('')}</select>
                                <select id="billSize" class="px-4 py-3 border-2 rounded-lg" style="border-color: ${config.primary_color};">${SIZES.map(s => `<option value="${s}" ${lastInput.size === s ? 'selected' : ''}>${s}</option>`).join('')}</select>
                                <input type="number" id="billQuantity" min="0.01" step="0.01" placeholder="الكمية" value="${lastInput.quantity || ''}" class="px-4 py-3 border-2 rounded-lg" style="border-color: ${config.primary_color};">
                                <button onclick="addBillItem();" class="px-6 py-3 rounded-lg font-semibold text-white" style="background-color: ${config.accent_color};">إضافة</button>
                            </div>
                        </div>
                        ${appState.billItems.length > 0 ? `<div class="card-shadow rounded-xl p-6 bg-white"><h2 class="text-2xl font-bold mb-4">عناصر الفاتورة</h2><div class="overflow-x-auto"><table class="w-full"><thead><tr class="border-b-2" style="border-color: ${config.primary_color};"><th class="text-center py-3 px-4">إجراء</th><th class="text-center py-3 px-4">الاجمالي</th><th class="text-center py-3 px-4">السعر</th><th class="text-center py-3 px-4">الكمية</th><th class="text-center py-3 px-4">المقاس</th><th class="text-right py-3 px-4">الفئة</th></tr></thead><tbody>${appState.billItems.map((item, idx) => `<tr class="border-b"><td class="text-center"><button onclick="removeBillItem(${idx});" class="px-3 py-1 bg-red-500 rounded text-white text-sm">حذف</button></td><td class="text-center font-bold" style="color: ${config.accent_color};">${item.total.toFixed(2)}</td><td class="text-center">${item.unitPrice.toFixed(2)}</td><td class="text-center">${item.quantity.toFixed(2)}</td><td class="text-center">${item.size}</td><td>${item.category}</td></tr>`).join('')}</tbody><tfoot><tr class="border-t-2" style="border-color: ${config.primary_color};"><td colspan="5" class="py-4 px-4 text-left font-bold text-xl">الإجمالي الكلي:</td><td class="py-4 px-4 text-center font-bold text-2xl" style="color: ${config.accent_color};">${appState.billItems.reduce((s, i) => s + i.total, 0).toFixed(2)} جنية</td></tr></tfoot></table></div><div class="mt-6 flex justify-end"><button onclick="saveBill();" ${isLoading('saveBill') ? 'disabled' : ''} class="px-8 py-3 rounded-lg font-bold text-white text-lg flex items-center gap-2" style="background-color: ${config.primary_color};">${isLoading('saveBill') ? '<div class="loading-spinner"></div>' : ''}<span>حفظ الفاتورة</span></button></div></div>` : ''}
                    </div>`;
            }

            return `
                <div class="fade-in">
                    <div class="flex justify-between items-center mb-4">
                        <h1 class="text-3xl md:text-4xl font-bold" style="color: ${config.text_color};">${isEditing ? 'تعديل الفاتورة' : 'إنشاء فاتورة جديدة'}</h1>
                        ${cancelButton}
                    </div>
                    ${stepsBar}
                    ${appState.billStep === 'items' ? `<div class="mb-4 no-print"><button onclick="backToClientName();" class="px-4 py-2 bg-gray-200 rounded-lg font-semibold text-sm hover:bg-gray-300">↩ رجوع لاسم العميل</button></div>` : ''}
                    ${content}
                </div>`;
        }

        function renderViewBill() {
            const config = window.elementSdk?.config || defaultConfig;
            const bill = appState.currentBill;
            const clientName = bill.billClientName || '';
            return `
                <div class="fade-in">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 no-print">
                        <h1 class="text-3xl md:text-4xl font-bold" style="color: ${config.text_color};">عرض الفاتورة</h1>
                        <div class="flex flex-wrap gap-2 md:gap-3">
                            <button onclick="appState.currentView = 'bills'; render();" class="px-4 md:px-6 py-2 md:py-3 bg-gray-300 rounded-lg font-semibold text-sm md:text-base">رجوع</button>
                            <button onclick="editBill();" class="px-4 md:px-6 py-2 md:py-3 rounded-lg font-semibold text-white flex items-center gap-2 text-sm md:text-base" style="background-color: ${config.accent_color};">✏️ تعديل</button>
                            <button onclick="printBill();" class="px-4 md:px-6 py-2 md:py-3 rounded-lg font-semibold text-white flex items-center gap-2 text-sm md:text-base" style="background-color: ${config.primary_color};">🖨️ طباعة</button>
                            <button onclick="shareBill();" ${isLoading('sharing') ? 'disabled' : ''} class="px-4 md:px-6 py-2 md:py-3 bg-blue-500 rounded-lg font-semibold text-white flex items-center gap-2 text-sm md:text-base">${isLoading('sharing') ? '<div class="loading-spinner"></div>' : '📤'} ${isLoading('sharing') ? 'جاري التحضير...' : 'مشاركة PDF'}</button>
                            <button onclick="downloadBillPDF();" ${isLoading('downloading') ? 'disabled' : ''} class="px-4 md:px-6 py-2 md:py-3 bg-green-600 rounded-lg font-semibold text-white flex items-center gap-2 text-sm md:text-base">${isLoading('downloading') ? '<div class="loading-spinner"></div>' : '⬇️'} ${isLoading('downloading') ? 'جاري التحميل...' : 'تنزيل PDF'}</button>
                        </div>
                    </div>
                    
                    <div id="view-bill-container" class="w-full">
                        <div id="printable-bill" class="card-shadow rounded-xl p-4 md:p-8 bg-white max-w-4xl mx-auto">
                            <div class="border-b-2 pb-6 mb-6" style="border-color: ${config.primary_color};">
                                <div class="print-header-grid">
                                    <div class="print-company text-right">
                                        <div class="flex items-center gap-3 mb-2">
                                            <div class="w-12 h-12 md:w-16 md:h-16 rounded-full flex items-center justify-center shrink-0" style="background: linear-gradient(135deg, ${config.primary_color}, ${config.secondary_color});">
                                                <span class="text-2xl md:text-3xl">👔</span>
                                            </div>
                                            <div>
                                                <h2 class="text-xl md:text-3xl font-bold">${escapeHtml(appState.companySettings.name)}</h2>
                                                <p class="opacity-75 text-xs md:text-sm">فاتورة مبيعات</p>
                                            </div>
                                        </div>
                                        <div class="space-y-1 text-sm md:text-base mt-2">
                                            <p>📞 ${escapeHtml(appState.companySettings.phone)}</p>
                                            <p>📍 ${escapeHtml(appState.companySettings.address)}</p>
                                        </div>
                                        ${clientName ? `
                                        <div class="mt-4 pt-3 border-t border-dashed" style="border-color: ${config.primary_color}; border-opacity: 0.3;">
                                            <p class="text-xs opacity-60 mb-1">العميل</p>
                                            <p class="text-xl md:text-2xl font-bold" style="color: ${config.primary_color};">أ/ ${escapeHtml(clientName)}</p>
                                        </div>` : ''}
                                    </div>
                                    
                                    <div class="print-invoice text-left">
                                        <div class="mb-4">
                                            <p class="text-xs md:text-sm opacity-75 mb-1">رقم الفاتورة</p>
                                            <p class="text-2xl md:text-3xl font-bold" style="color: ${config.primary_color};">${bill.billNumber}</p>
                                        </div>
                                        <div>
                                            <p class="text-xs md:text-sm opacity-75 mb-1">التاريخ</p>
                                            <p class="text-base md:text-lg font-semibold">${new Date(bill.billDate).toLocaleDateString('ar-SA', { year: 'numeric', month: 'long', day: 'numeric' })}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="mb-8 overflow-x-auto">
                                <table class="mt-8 w-full min-w-[600px]">
                                    <thead>
                                        <tr class="border-b-2" style="border-color: ${config.primary_color};">
                                            <th class="text-center py-2 px-2 font-bold">الإجمالي</th>
                                            <th class="text-center py-2 px-2 font-bold">سعر الوحدة</th>
                                            <th class="text-center py-2 px-2 font-bold">الكمية</th>
                                            <th class="text-center py-2 px-2 font-bold">المقاس</th>
                                            <th class="text-right py-2 px-2 font-bold">الفئة</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${bill.items.map(item => `
                                            <tr class="border-b">
                                                <td class="py-2 px-2 text-center font-semibold">${item.total.toFixed(2)}</td>
                                                <td class="py-2 px-2 text-center">${item.unitPrice.toFixed(2)}</td>
                                                <td class="py-2 px-2 text-center">${item.quantity.toFixed(2)}</td>
                                                <td class="py-2 px-2 text-center">${item.size}</td>
                                                <td class="py-2 px-2">${escapeHtml(item.category)}</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                            
                            <div class="border-t-2 pt-6" style="border-color: ${config.primary_color};">
                                <div class="flex justify-between items-center">
                                    <span class="text-xl md:text-2xl font-bold">الإجمالي الكلي</span>
                                    <span class="text-3xl md:text-4xl font-bold" style="color: ${config.accent_color};">${bill.billTotal.toFixed(2)} جنية</span>
                                </div>
                            </div>
                            
                            <div class="mt-4 pt-4 border-t text-center opacity-75 text-sm md:text-base">
                                <p>${escapeHtml(appState.companySettings.footer)}</p>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        function renderSettings() {
            const config = window.elementSdk?.config || defaultConfig;
            return `
                <div class="fade-in">
                    <h1 class="text-4xl font-bold mb-8" style="color: ${config.text_color};">الإعدادات</h1>
                    <div class="card-shadow rounded-xl p-6 bg-white max-w-2xl"><h2 class="text-2xl font-bold mb-6">معلومات الشركة</h2>
                        <form onsubmit="saveSettings(event);" class="space-y-6">
                            <div><label class="block text-sm font-semibold mb-2">اسم الشركة</label><input type="text" id="settingsName" value="${escapeHtml(appState.companySettings.name)}" required class="w-full px-4 py-3 border-2 rounded-lg" style="border-color: ${config.primary_color};"></div>
                            <div><label class="block text-sm font-semibold mb-2">رقم الهاتف</label><input type="text" id="settingsPhone" value="${escapeHtml(appState.companySettings.phone)}" required class="w-full px-4 py-3 border-2 rounded-lg" style="border-color: ${config.primary_color};"></div>
                            <div><label class="block text-sm font-semibold mb-2">العنوان</label><input type="text" id="settingsAddress" value="${escapeHtml(appState.companySettings.address)}" required class="w-full px-4 py-3 border-2 rounded-lg" style="border-color: ${config.primary_color};"></div>
                            <div><label class="block text-sm font-semibold mb-2">نص التذييل</label><input type="text" id="settingsFooter" value="${escapeHtml(appState.companySettings.footer)}" required class="w-full px-4 py-3 border-2 rounded-lg" style="border-color: ${config.primary_color};"></div>
                            <button type="submit" ${isLoading('saveSettings') ? 'disabled' : ''} class="w-full py-3 rounded-lg font-bold text-white text-lg flex items-center justify-center gap-2" style="background-color: ${config.primary_color};">${isLoading('saveSettings') ? '<div class="loading-spinner"></div>' : ''}<span>حفظ الإعدادات</span></button>
                        </form>
                    </div>
                </div>`;
        }

        const element = {
            defaultConfig,
            onConfigChange: () => render(),
            mapToCapabilities: (config) => ({
                recolorables: [
                    { get: () => config.primary_color || defaultConfig.primary_color, set: (v) => { config.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); } },
                    { get: () => config.secondary_color || defaultConfig.secondary_color, set: (v) => { config.secondary_color = v; window.elementSdk.setConfig({ secondary_color: v }); } },
                    { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
                    { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
                    { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } }
                ],
                fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
                fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
            })
        };

        async function init() {
            if (window.elementSdk) await window.elementSdk.init(element);
            if (window.dataSdk) await window.dataSdk.init(dataHandler);
            render();
        }
        init();
    </script>
</body>
</html>
