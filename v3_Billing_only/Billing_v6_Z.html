<!doctype html>
<html lang="ar" dir="rtl" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>نظام إدارة مصنع الملابس | الذهب الأبيض</title>
    <meta name="description" content="نظام متكامل لإدارة مصانع الملابس، فواتير محترفة، تسعير دقيق، وإدارة مخزون شاملة مع دليل عملاء ومزامنة سحابية.">
    <meta name="theme-color" content="#667eea">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👔</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="/_sdk/data_sdk.js"></script>
    <script src="/_sdk/element_sdk.js"></script>
    <style>
        * { font-family: 'Cairo', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card-shadow { box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); }
        .hover-scale { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .hover-scale:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15); }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); transition: all 0.3s ease; }
        .btn-primary:hover { transform: scale(1.05); box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4); }
        .size-badge { transition: all 0.2s ease; }
        .size-badge:hover { transform: scale(1.1); }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .loading-spinner { border: 3px solid rgba(255, 255, 255, 0.3); border-top: 3px solid white; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .sync-pulse { animation: syncPulse 2s ease-in-out infinite; }
        @keyframes syncPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .customer-item { transition: all 0.15s ease; }
        .customer-item:hover, .customer-item:active { transform: scale(0.98); }
        .customer-item.selected { ring: 3px; }
        .dropdown-enter { animation: dropIn 0.2s ease-out; }
        @keyframes dropIn { from { opacity: 0; transform: translateY(-8px) scaleY(0.95); } to { opacity: 1; transform: translateY(0) scaleY(1); } }
        .print-only { display: none; }
        .print-header-grid { display: grid; grid-template-columns: 1fr; gap: 1.5rem; align-items: start; }
        @media (min-width: 768px) { .print-header-grid { grid-template-columns: 1fr 1fr; gap: 1rem; } }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .print-header-grid { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 0 !important; align-items: start !important; }
            .print-company { text-align: right !important; margin: 0 !important; padding: 0 !important; }
            .print-invoice { text-align: left !important; margin: 0 !important; padding: 0 !important; }
            .print-company div, .print-invoice div { margin: 0 !important; padding: 0 !important; }
            #printable-bill { display: block !important; height: auto !important; overflow: visible !important; position: static !important; background: white !important; }
            body { background: white; }
            html, body, #app, .h-full, .min-h-screen { height: auto !important; overflow: visible !important; position: static !important; }
            .flex-1, .overflow-auto, .overflow-hidden { overflow: visible !important; height: auto !important; display: block !important; }
            .fixed.inset-y-0 { display: none !important; }
        }
        .pdf-capture-mode .print-header-grid { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 0 !important; align-items: start !important; }
        .pdf-capture-mode .print-company { text-align: right !important; margin: 0 !important; padding: 0 !important; }
        .pdf-capture-mode .print-invoice { text-align: left !important; margin: 0 !important; padding: 0 !important; }
        .pdf-capture-mode .print-company div, .pdf-capture-mode .print-invoice div { margin: 0 !important; padding: 0 !important; }
        .pdf-capture-mode { height: auto !important; overflow: visible !important; display: block !important; }
        @view-transition { navigation: auto; }
        .avatar-circle { display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: 700; color: white; flex-shrink: 0; }
        .overlay-bg { background: rgba(0,0,0,0.4); backdrop-filter: blur(2px); }
        /* قائمة العملاء القابلة للتمرير */
        .customer-list-scroll { max-height: 320px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .customer-list-scroll::-webkit-scrollbar { width: 4px; }
        .customer-list-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
    </style>
</head>
<body class="h-full w-full">
    <div id="app" class="h-full w-full overflow-auto"></div>
    <script>
        /* === طبقة تجريد المزامنة السحابية === */
        if (!window.dataSdk) {
            window.dataSdk = {
                _pendingOps: [],
                _syncInterval: null,
                _isCloudBackend: false,
                init: async (handler) => {
                    window._dataHandler = handler;
                    let data = JSON.parse(localStorage.getItem('app_data') || '[]');
                    if (!data.some(d => d.type === 'pricingModel')) {
                        const SIZES = []; for (let i = 22; i <= 56; i += 2) SIZES.push(i);
                        const createCategory = (name, priceMap) => ({ name, prices: SIZES.map(s => ({ size: s, price: priceMap[s] || 0 })) });
                        const seedModels = [
                            { name: "A", data: [createCategory("سليب", { 26: 160, 28: 180, 30: 200, 32: 225, 34: 250, 36: 275, 38: 300, 40: 325, 42: 355, 44: 385, 46: 420, 48: 460, 50: 500, 52: 540, 54: 580, 56: 620 }), createCategory("نصف كم", { 22: 220, 24: 250, 26: 280, 28: 315, 30: 350, 32: 385, 34: 420, 36: 455, 38: 490, 40: 525, 42: 560, 44: 600, 46: 650, 48: 700, 50: 755, 52: 810, 54: 865, 56: 920 }), createCategory("شورت", { 26: 205, 28: 235, 30: 265, 32: 300, 34: 335, 36: 370, 38: 405, 40: 440, 42: 485, 44: 530, 46: 575, 48: 625, 50: 675, 52: 725, 54: 775, 56: 825 }), createCategory("حماله", { 22: 200, 24: 220, 26: 245, 28: 270, 30: 295, 32: 320, 34: 345, 36: 370, 38: 395, 40: 420, 42: 445, 44: 470, 46: 500, 48: 540, 50: 580, 52: 625, 54: 670, 56: 715 })] },
                            { name: "B", data: [createCategory("سليب", { 44: 365, 46: 400, 48: 435, 50: 475, 52: 515, 54: 555, 56: 595 }), createCategory("نصف كم", { 44: 580, 46: 625, 48: 675, 50: 730, 52: 785, 54: 845, 56: 905 }), createCategory("شورت", { 44: 505, 46: 555, 48: 605, 50: 655, 52: 705, 54: 755, 56: 805 }), createCategory("حماله", { 44: 450, 46: 480, 48: 520, 50: 560, 52: 605, 54: 650, 56: 695 })] },
                            { name: "C", data: [createCategory("سليب", { 26: 150, 28: 170, 30: 195, 32: 220, 34: 245, 36: 270, 38: 295, 40: 320, 42: 345, 44: 370, 46: 400, 48: 435, 50: 475, 52: 515, 54: 555, 56: 595 }), createCategory("نصف كم", { 22: 210, 24: 240, 26: 270, 28: 305, 30: 340, 32: 375, 34: 410, 36: 445, 38: 480, 40: 515, 42: 550, 44: 585, 46: 625, 48: 680, 50: 735, 52: 790, 54: 845, 56: 900 }), createCategory("شورت", { 26: 210, 28: 240, 30: 270, 32: 300, 34: 330, 36: 360, 38: 390, 40: 420, 42: 450, 44: 500, 46: 550, 48: 600, 50: 650, 52: 700, 54: 750, 56: 800 }), createCategory("حماله", { 22: 185, 24: 205, 26: 230, 28: 255, 30: 280, 32: 305, 34: 330, 36: 355, 38: 380, 40: 405, 42: 430, 44: 455, 46: 480, 48: 520, 50: 560, 52: 600, 54: 645, 56: 690 })] },
                            { name: "D", data: [createCategory("كلسون", { 22: 205, 24: 235, 26: 265, 28: 295, 30: 325, 32: 355, 34: 390, 36: 425, 38: 460 }), createCategory("كم", { 22: 260, 24: 285, 26: 315, 28: 345, 30: 390, 32: 435, 34: 480, 36: 530, 38: 580 })] },
                            { name: "طقم دفاية", data: [createCategory("المجموع", { 28: 60, 30: 70, 32: 80, 34: 90, 36: 100, 38: 110, 40: 120, 42: 130, 44: 140, 46: 180, 48: 190, 50: 200, 52: 210, 54: 220, 56: 230 }), createCategory("كلسون", { 28: 25, 30: 30, 32: 35, 34: 40, 36: 45, 38: 50, 40: 55, 42: 60, 44: 65, 46: 85, 48: 90, 50: 95, 52: 100, 54: 105, 56: 110 }), createCategory("كم", { 28: 35, 30: 40, 32: 45, 34: 50, 36: 55, 38: 60, 40: 65, 42: 70, 44: 75, 46: 95, 48: 100, 50: 105, 52: 110, 54: 115, 56: 120 })] }
                        ];
                        data = [...data, ...seedModels.map((m, i) => ({ type: 'pricingModel', pricingModelName: m.name, pricingModelData: JSON.stringify(m.data), createdAt: new Date().toISOString(), __backendId: 'seed_' + i }))];
                        localStorage.setItem('app_data', JSON.stringify(data));
                    }
                    // بدء المزامنة الدورية في الخلفية
                    this._startBackgroundSync(handler);
                    handler.onDataChanged(data);
                    return { isOk: true };
                },
                _startBackgroundSync: function(handler) {
                    // فحص حالة الاتصال كل 30 ثانية
                    this._syncInterval = setInterval(() => {
                        const isOnline = navigator.onLine;
                        if (isOnline && this._pendingOps.length > 0) {
                            this._flushPending(handler);
                        }
                        if (window._dataHandler && window._dataHandler.onSyncStatusChanged) {
                            window._dataHandler.onSyncStatusChanged(isOnline ? (this._isCloudBackend ? 'synced' : 'local') : 'offline');
                        }
                    }, 30000);
                    // فحص فوري
                    window.addEventListener('online', () => {
                        if (this._pendingOps.length > 0) this._flushPending(handler);
                        if (window._dataHandler && window._dataHandler.onSyncStatusChanged) {
                            window._dataHandler.onSyncStatusChanged(this._isCloudBackend ? 'synced' : 'local');
                        }
                    });
                    window.addEventListener('offline', () => {
                        if (window._dataHandler && window._dataHandler.onSyncStatusChanged) {
                            window._dataHandler.onSyncStatusChanged('offline');
                        }
                    });
                },
                _flushPending: function(handler) {
                    // في وضع التخزين المحلي، لا توجد عمليات معلقة حقيقية
                    // هذه النقطة هي حيث يتم إرسال البيانات إلى Firebase/Supabase في الإنتاج
                    this._pendingOps = [];
                },
                _queueOp: function(op) {
                    this._pendingOps.push({ ...op, timestamp: Date.now() });
                    localStorage.setItem('pending_ops', JSON.stringify(this._pendingOps));
                },
                create: async (item) => {
                    this._queueOp({ action: 'create', item });
                    const data = JSON.parse(localStorage.getItem('app_data') || '[]');
                    const newItem = { ...item, __backendId: Date.now().toString() };
                    data.push(newItem);
                    localStorage.setItem('app_data', JSON.stringify(data));
                    if (window._dataHandler) window._dataHandler.onDataChanged(data);
                    return { isOk: true, id: newItem.__backendId };
                },
                update: async (item) => {
                    this._queueOp({ action: 'update', item });
                    const data = JSON.parse(localStorage.getItem('app_data') || '[]');
                    const index = data.findIndex(d => d.__backendId === item.__backendId);
                    if (index >= 0) { data[index] = item; localStorage.setItem('app_data', JSON.stringify(data)); if (window._dataHandler) window._dataHandler.onDataChanged(data); return { isOk: true }; }
                    return { isOk: false };
                },
                delete: async (item) => {
                    this._queueOp({ action: 'delete', item });
                    let data = JSON.parse(localStorage.getItem('app_data') || '[]');
                    data = data.filter(d => d.__backendId !== item.__backendId);
                    localStorage.setItem('app_data', JSON.stringify(data));
                    if (window._dataHandler) window._dataHandler.onDataChanged(data);
                    return { isOk: true };
                }
            };
        }

        const defaultConfig = {
            company_name: "مصنع الذهب الأبيض للملابس", tagline: "جودة عالية وأسعار منافسة",
            primary_color: "#667eea", secondary_color: "#764ba2", accent_color: "#48bb78",
            background_color: "#f7fafc", text_color: "#2d3748", font_family: "Cairo", font_size: 16
        };

        /* === حالة التطبيق === */
        let appState = {
            currentView: 'dashboard', isSidebarOpen: false,
            companySettings: { name: "مصنع الذهب الأبيض للملابس", phone: "+201212813475", address: "العاشر من رمضان، الشرقية", footer: "شكراً لتعاملكم معنا" },
            pricingModels: [], bills: [], customers: [],
            categories: ["سليب", "نصف كم", "شورت", "حماله", "كلسون", "كم", "المجموع"],
            selectedModel: null, editingModel: null, viewingModel: null,
            billItems: [], currentBill: null, editingBillId: null, lastBillInput: null,
            currentBillClientName: '', billStep: 'selectModel',
            loadingStates: {}, settings: null,
            // === حقول دليل العملاء الجديدة ===
            customerSearchTerm: '', selectedCustomerId: null,
            editingCustomer: null, viewingCustomerId: null,
            showNewCustomerInline: false, newCustomerInlineName: '', newCustomerInlinePhone: '',
            customerDirSearch: '', customerDirSort: 'recent',
            syncStatus: navigator.onLine ? 'local' : 'offline',
            pendingOpsCount: 0
        };

        const SIZES = (() => { const s = []; for (let i = 22; i <= 56; i += 2) s.push(i); return s; })();

        // ألوان الأفاتار للعملاء
        const AVATAR_COLORS = ['#667eea','#764ba2','#48bb78','#ed8936','#e53e3e','#38b2ac','#d69e2e','#9f7aea','#fc8181','#63b3ed'];
        function getAvatarColor(name) { let hash = 0; for (let i = 0; i < (name||'').length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash); return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length]; }
        function getInitials(name) { if (!name) return '؟'; const parts = name.trim().split(/\s+/); return parts.length >= 2 ? (parts[0][0] + parts[1][0]) : name.slice(0, 2); }

        /* === معالج البيانات مع دعم العملاء === */
        const dataHandler = {
            onDataChanged(data) {
                const settings = data.find(d => d.type === 'settings');
                if (settings) { appState.settings = settings; appState.companySettings = { name: settings.companyName || appState.companySettings.name, phone: settings.companyPhone || appState.companySettings.phone, address: settings.companyAddress || appState.companySettings.address, footer: settings.companyFooter || appState.companySettings.footer }; }
                appState.pricingModels = data.filter(d => d.type === 'pricingModel').map(m => ({ ...m, data: JSON.parse(m.pricingModelData) }));
                appState.customers = data.filter(d => d.type === 'customer').map(c => ({ ...c }));
                appState.bills = data.filter(d => d.type === 'bill').map(b => {
                    const bill = { ...b, items: JSON.parse(b.billItems) };
                    if (!bill.hasOwnProperty('billClientName')) bill.billClientName = '';
                    if (!bill.hasOwnProperty('billCustomerId')) bill.billCustomerId = null;
                    return bill;
                });
                // تحديث عدد العمليات المعلقة
                const pending = JSON.parse(localStorage.getItem('pending_ops') || '[]');
                appState.pendingOpsCount = pending.length;
                render();
            },
            onSyncStatusChanged(status) {
                appState.syncStatus = status;
                const pending = JSON.parse(localStorage.getItem('pending_ops') || '[]');
                appState.pendingOpsCount = pending.length;
                // تحديث مؤشر المزامنة فقط بدون إعادة عرض كاملة
                const syncEl = document.getElementById('sync-indicator');
                if (syncEl) syncEl.outerHTML = renderSyncIndicator();
            }
        };

        function escapeHtml(text) { if (text === null || text === undefined) return ''; return String(text).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }
        function setLoading(key, isLoading) { appState.loadingStates[key] = isLoading; render(); }
        function isLoading(key) { return appState.loadingStates[key] || false; }
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-lg shadow-lg text-white z-[100] fade-in text-sm md:text-base max-w-[90vw] text-center ${type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500'}`;
            toast.textContent = message; document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s ease'; setTimeout(() => toast.remove(), 300); }, 3000);
        }
        function toggleSidebar() { appState.isSidebarOpen = !appState.isSidebarOpen; render(); }
        function getCategoryIcon(category) { const icons = { 'سليب': '🩲', 'نصف كم': '👕', 'شورت': '🩳', 'حماله': '🏃', 'كلسون': '🩲', 'كم': '👕', 'المجموع': '🧮' }; return icons[category] || '👔'; }

        /* === مؤشر حالة المزامنة === */
        function renderSyncIndicator() {
            const statusMap = {
                'synced': { icon: '●', color: '#48bb78', label: 'متزامن', pulse: false },
                'local': { icon: '●', color: '#d69e2e', label: 'تخزين محلي', pulse: false },
                'offline': { icon: '●', color: '#e53e3e', label: 'غير متصل', pulse: true },
                'syncing': { icon: '●', color: '#667eea', label: 'جاري المزامنة...', pulse: true }
            };
            const s = statusMap[appState.syncStatus] || statusMap['local'];
            const pendingHtml = appState.pendingOpsCount > 0 ? `<span class="bg-red-500 text-white text-[10px] rounded-full w-4 h-4 flex items-center justify-center absolute -top-1 -left-1">${appState.pendingOpsCount}</span>` : '';
            return `<div id="sync-indicator" class="relative flex items-center gap-2 text-sm ${s.pulse ? 'sync-pulse' : ''}" style="color: ${s.color};"><span style="font-size: 8px;">${s.icon}</span><span class="opacity-90">${s.label}</span>${pendingHtml}</div>`;
        }

        /* === عمليات العملاء CRUD === */
        function getCustomerById(id) { return appState.customers.find(c => c.__backendId === id); }
        function getCustomerName(customerId) {
            if (!customerId) return '';
            const c = getCustomerById(customerId);
            return c ? c.customerName : '';
        }
        function getCustomerBills(customerId) { return appState.bills.filter(b => b.billCustomerId === customerId); }
        function getCustomerTotalSpent(customerId) { return getCustomerBills(customerId).reduce((s, b) => s + b.billTotal, 0); }

        // العملاء الأكثر استخداماً (لعرضهم أولاً في القائمة المنسدلة)
        function getRecentCustomerIds(limit = 8) {
            const withCustomer = appState.bills.filter(b => b.billCustomerId).sort((a, b) => new Date(b.billDate) - new Date(a.billDate));
            const seen = new Set(); const result = [];
            for (const bill of withCustomer) {
                if (!seen.has(bill.billCustomerId)) { seen.add(bill.billCustomerId); result.push(bill.billCustomerId); if (result.length >= limit) break; }
            }
            return result;
        }

        function getFilteredCustomersForDropdown() {
            const term = appState.customerSearchTerm.toLowerCase().trim();
            const recentIds = getRecentCustomerIds(8);
            let customers = [...appState.customers];

            if (term) {
                customers = customers.filter(c =>
                    c.customerName.toLowerCase().includes(term) ||
                    (c.customerPhone && c.customerPhone.includes(term))
                );
                return customers;
            }

            // بدون بحث: العملاء الأخيرون أولاً، ثم البقية
            const recent = recentIds.map(id => customers.find(c => c.__backendId === id)).filter(Boolean);
            const rest = customers.filter(c => !recentIds.includes(c.__backendId));
            // ترتيب البقية حسب تاريخ الإنشاء
            rest.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            return [...recent, ...rest];
        }

        async function createCustomer(name, phone, notes) {
            if (!name || !name.trim()) return null;
            setLoading('createCustomer', true);
            const result = await window.dataSdk.create({
                type: 'customer', customerName: name.trim(), customerPhone: (phone || '').trim(),
                customerNotes: (notes || '').trim(), createdAt: new Date().toISOString()
            });
            setLoading('createCustomer', false);
            return result.isOk ? result.id : null;
        }

        async function updateCustomer(customer) {
            setLoading('updateCustomer', true);
            const result = await window.dataSdk.update(customer);
            if (result.isOk) { appState.editingCustomer = null; showToast('تم تحديث بيانات العميل', 'success'); }
            else showToast('حدث خطأ أثناء التحديث', 'error');
            setLoading('updateCustomer', false);
        }

        async function deleteCustomer(customerId) {
            const bills = getCustomerBills(customerId);
            const confirmEl = document.getElementById(`confirm-cust-${customerId}`);
            if (confirmEl && confirmEl.dataset.visible === 'true') {
                setLoading(`delete-cust-${customerId}`, true);
                // فك ربط الفواتير بدلاً من حذفها
                for (const bill of bills) {
                    await window.dataSdk.update({ ...bill, billCustomerId: null, billClientName: getCustomerName(customerId) });
                }
                const customer = getCustomerById(customerId);
                const result = await window.dataSdk.delete(customer);
                if (result.isOk) {
                    showToast(bills.length > 0 ? `تم حذف العميل وفك ربط ${bills.length} فاتورة` : 'تم حذف العميل', 'success');
                    if (appState.viewingCustomerId === customerId) { appState.viewingCustomerId = null; appState.currentView = 'customers'; }
                } else showToast('حدث خطأ', 'error');
                setLoading(`delete-cust-${customerId}`, false);
            } else {
                if (confirmEl) { confirmEl.dataset.visible = 'true'; confirmEl.style.display = 'flex'; confirmEl.innerHTML = bills.length > 0 ? `تأكيد (مع ${bills.length} فاتورة)` : 'تأكيد الحذف'; setTimeout(() => { if (confirmEl) { confirmEl.dataset.visible = 'false'; confirmEl.style.display = 'none'; } }, 4000); }
            }
        }

        /* === أحداث واجهة العملاء في الفاتورة === */
        function onCustomerSearchInput(value) { appState.customerSearchTerm = value; appState.showNewCustomerInline = false; render(); }
        function selectCustomerForBill(customerId) {
            appState.selectedCustomerId = customerId;
            appState.customerSearchTerm = '';

        async function importFromExcel(event) {
            const file = event.target.files[0]; if (!file) return;
            setLoading('importExcel', true);
            try {
                const data = await file.arrayBuffer(); const workbook = XLSX.read(data, { type: 'array' });
                const sheetName = workbook.SheetNames[0]; const sheet = workbook.Sheets[sheetName];
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                if (rows.length < 2) throw new Error('الملف فارغ أو لا يحتوي على بيانات');
                let headerRowIndex = -1, sizeColIndex = -1; const categoryMap = new Map();
                for (let i = 0; i < rows.length; i++) {
                    const row = rows[i]; if (!row) continue;
                    const sizeIdx = row.findIndex(cell => cell && cell.toString().trim() === 'المقاس');
                    if (sizeIdx !== -1) {
                        headerRowIndex = i; sizeColIndex = sizeIdx;
                        for (let j = 0; j < row.length; j++) { if (j === sizeIdx) continue; let catName = row[j]?.toString().trim(); if (!catName) continue; if (catName === 'نصفكم') catName = 'نصف كم'; if (catName === 'سبور') catName = 'حماله'; categoryMap.set(j, catName); }
                        break;
                    }
                }
                if (headerRowIndex === -1) throw new Error('لم يتم العثور على صف الرأس الذي يحتوي على "المقاس"');
                const modelData = []; const categoryNames = Array.from(categoryMap.values());
                for (let catName of categoryNames) modelData.push({ name: catName, prices: SIZES.map(s => ({ size: s, price: 0 })) });
                for (let i = headerRowIndex + 1; i < rows.length; i++) {
                    const row = rows[i]; if (!row || row.length === 0) continue;
                    const sizeCell = row[sizeColIndex]; if (sizeCell === undefined || sizeCell === null) continue;
                    const size = parseInt(sizeCell); if (isNaN(size) || !SIZES.includes(size)) continue;
                    for (let [colIdx, catName] of categoryMap.entries()) {
                        const priceCell = row[colIdx]; if (priceCell === undefined || priceCell === null || priceCell === '------' || priceCell === '') continue;
                        const price = parseFloat(priceCell); if (isNaN(price)) continue;
                        const catData = modelData.find(c => c.name === catName); if (catData) { const priceEntry = catData.prices.find(p => p.size === size); if (priceEntry) priceEntry.price = price; }
                    }
                }
                let modelName = file.name.replace(/\.[^/.]+$/, ""); modelName = prompt("أدخل اسم النموذج:", modelName);
                if (!modelName || !modelName.trim()) { setLoading('importExcel', false); return; }
                const result = await window.dataSdk.create({ type: 'pricingModel', pricingModelName: modelName.trim(), pricingModelData: JSON.stringify(modelData), createdAt: new Date().toISOString() });
                showToast(result.isOk ? 'تم استيراد النموذج بنجاح' : 'حدث خطأ', result.isOk ? 'success' : 'error');
            } catch (err) { console.error(err); showToast('خطأ في قراءة الملف: ' + err.message, 'error'); }
            finally { setLoading('importExcel', false); event.target.value = ''; render(); }
        }

                            ${customers.map(c => {

-between items-start md:items-center mb-4 gap-4"><div class="flex-1"><h3 class="text-xl font-bold mb-2">${escapeHtml(model.pricingModelName)}</h3><div class="flex items-center gap-4"><div class="flex-1 bg-gray-200 rounded-full h-2 max-w-xs"><div class="h-2 rounded-full" style="width: ${percent}%; background-color: ${config.accent_color};"></div></div><span class="text-sm font-semibold">${totalPrices}/${totalPossible} (${percent}%)</span></div></div><div class="flex flex-wrap gap-2"><button onclick="viewModelDetails('${model.__backendId}');" class="px-3 py-2 bg-gray-200 rounded-lg font-semibold text-sm">عرض</button><button onclick="editModel(appState.pricingModels.find(m=>m.__backendId==='${model.__backendId}'));" class="px-3 py-2 rounded-lg font-semibold text-white text-sm" style="background-color: ${config.primary_color};">تعديل</button><button onclick="duplicateModel('${model.__backendId}');" class="px-3 py-2 bg-blue-500 rounded-lg font-semibold text-white text-sm">نسخ</button><div class="flex gap-1"><button onclick="deletePricingModel(appState.pricingModels.find(m=>m.__backendId==='${model.__backendId}'));" id="delete-${model.__backendId}" ${isLoading(`delete-${model.__backendId}`) ? 'disabled' : ''} class="px-3 py-2 bg-red-500 rounded-lg font-semibold text-white text-sm flex items-center gap-1">${isLoading(`delete-${model.__backendId}`) ? '<div class="loading-spinner" style="width:14px;height:14px;border-width:2px;"></div>' : 'حذف'}</button><button id="confirm-${model.__backendId}" onclick="deletePricingModel(appState.pricingModels.find(m=>m.__backendId==='${model.__backendId}'));" style="display:none;" class="px-3 py-2 bg-red-700 rounded-lg font-semibold text-white text-sm">تأكيد</button></div></div></div><div class="grid grid-cols-2 md:grid-cols-4 gap-3">${model.data.slice(0, 4).map(cat => `<div class="p-3 rounded-lg" style="background-color: ${config.background_color};"><div class="flex items-center gap-2 mb-1"><span>${getCategoryIcon(cat.name)}</span><p class="font-semibold text-sm">${cat.name}</p></div><p class="text-xs opacity-75">${cat.prices.filter(p => p.price > 0).length}/${SIZES.length} مقاس</p></div>`).join('')}${model.data.length > 4 ? `<div class="p-3 rounded-lg flex items-center justify-center" style="background-color: ${config.background_color};"><p class="font-semibold text-sm" style="color: ${config.primary_color};">+${model.data.length - 4}</p></div>` : ''}</div></div>`; }).join('')}</div></div>`;

        /* === الفواتير (محدّثة مع أسماء العملاء) === */

            const sortedBills = [...appState.bills].sort((a, b) => new Date(b.billDate) - new Date(a.billDate));

                    <div class="flex justify-between items-center mb-8"><h1 class="text-3xl md:text-4xl font-bold" style="color: ${config.text_color};">الفواتير</h1><button onclick="startNewBill();" class="px-5 py-2.5 rounded-lg font-semibold text-white flex items-center gap-2 text-sm" style="background-color: ${config.primary_color};"><span class="text-xl">➕</span><span>فاتورة جديدة</span></button></div>
                    ${appState.bills.length === 0 ? `<div class="card-shadow rounded-xl p-12 bg-white text-center"><div class="text-6xl mb-4">📄</div><h3 class="text-2xl font-bold mb-2">لا توجد فواتير</h3><button onclick="startNewBill();" class="px-8 py-3 rounded-lg font-semibold text-white mt-4" style="background-color: ${config.primary_color};">إنشاء فاتورة</button></div>` : `
                        <div class="mb-6"><input type="text" id="billSearch" onkeyup="filterBills();" placeholder="بحث برقم الفاتورة..." class="w-full px-4 py-3 border-2 rounded-lg text-sm" style="border-color: ${config.primary_color};"></div>

                            <div class="card-shadow rounded-xl p-5" style="background-color: ${config.accent_color};"><div class="text-white"><p class="text-xs opacity-90 mb-1">إجمالي المبيعات</p><p class="text-2xl md:text-3xl font-bold">${appState.bills.reduce((s, b) => s + b.billTotal, 0).toFixed(0)} ج</p></div></div>
                            <div class="card-shadow rounded-xl p-5 bg-white"><div><p class="text-xs opacity-75 mb-1">متوسط الفاتورة</p><p class="text-2xl md:text-3xl font-bold" style="color: ${config.primary_color};">${(appState.bills.reduce((s, b) => s + b.billTotal, 0) / appState.bills.length).toFixed(0)} ج</p></div></div>

                        <div class="card-shadow rounded-xl p-4 md:p-6 bg-white"><div class="overflow-x-auto"><table class="w-full"><thead><tr class="border-b-2" style="border-color: ${config.primary_color};"><th class="text-right py-3 px-4 text-sm">رقم</th><th class="text-right py-3 px-4 text-sm">العميل</th><th class="text-right py-3 px-4 text-sm hidden md:table-cell">التاريخ</th><th class="text-right py-3 px-4 text-sm">عناصر</th><th class="text-right py-3 px-4 text-sm">المبلغ</th><th class="text-center py-3 px-4 text-sm">إجراء</th></tr></thead>
                        <tbody>${sortedBills.map(bill => {
                            const cName = bill.billCustomerId ? getCustomerName(bill.billCustomerId) : bill.billClientName;
                            const cId = bill.billCustomerId;

        }

                content = `

                                <div class="w-16 h-16 rounded-full mx-auto mb-3 flex items-center justify-center" style="background-color: ${config.background_color};"><span class="text-3xl">👤</span></div>

                            <!-- حقل البحث -->

                                <input type="text" value="${escapeHtml(appState.customerSearchTerm)}" oninput="onCustomerSearchInput(this.value);" placeholder="بحث بالاسم أو رقم الهاتف..." class="w-full px-4 py-3 pr-10 border-2 rounded-xl text-sm" style="border-color: ${config.primary_color};" id="custDropdownSearch" autocomplete="off">

                            <!-- زر إضافة عميل جديد -->
                            ${!isSearching ? `
                                <div class="p-4 border-t" style="border-color: ${config.background_color};">

                                </div>
                            ` : ''}

                            </div>
                        </div>
                        ${appState.billItems.length > 0 ? `<div class="card-shadow rounded-xl p-5 bg-white"><h2 class="text-lg font-bold mb-4">عناصر الفاتورة (${appState.billItems.length})</h2><div class="overflow-x-auto"><table class="w-full"><thead><tr class="border-b-2" style="border-color: ${config.primary_color};"><th class="text-center py-2 px-3 text-xs">حذف</th><th class="text-center py-2 px-3 text-xs">الإجمالي</th><th class="text-center py-2 px-3 text-xs">السعر</th><th class="text-center py-2 px-3 text-xs">الكمية</th><th class="text-center py-2 px-3 text-xs">المقاس</th><th class="text-right py-2 px-3 text-xs">الفئة</th></tr></thead><tbody>${appState.billItems.map((item, idx) => `<tr class="border-b"><td class="text-center"><button onclick="removeBillItem(${idx});" class="px-2 py-1 bg-red-500 rounded text-white text-xs">حذف</button></td><td class="text-center font-bold text-sm" style="color: ${config.accent_color};">${item.total.toFixed(2)}</td><td class="text-center text-sm">${item.unitPrice.toFixed(2)}</td><td class="text-center text-sm">${item.quantity.toFixed(2)}</td><td class="text-center text-sm">${item.size}</td><td class="text-sm">${item.category}</td></tr>`).join('')}</tbody><tfoot><tr class="border-t-2" style="border-color: ${config.primary_color};"><td colspan="5" class="py-4 px-3 text-left font-bold text-lg">الإجمالي:</td><td class="py-4 px-3 text-center font-bold text-xl" style="color: ${config.accent_color};">${appState.billItems.reduce((s, i) => s + i.total, 0).toFixed(2)} ج</td></tr></tfoot></table></div><div class="mt-6 flex justify-end"><button onclick="saveBill();" ${isLoading('saveBill') ? 'disabled' : ''} class="px-8 py-3 rounded-xl font-bold text-white text-base flex items-center gap-2" style="background-color: ${config.primary_color};">${isLoading('saveBill') ? '<div class="loading-spinner"></div>' : ''}<span>حفظ الفاتورة</span></button></div></div>` : ''}
                    </div>`;
            }

            return `<div class="fade-in"><div class="flex justify-between items-center mb-4"><h1 class="text-2xl md:text-4xl font-bold" style="color: ${config.text_color};">${isEditing ? 'تعديل الفاتورة' : 'فاتورة جديدة'}</h1><button onclick="cancelNewBill();" class="px-5 py-2.5 bg-gray-300 rounded-lg font-semibold text-sm">إلغاء</button></div>${stepsBar}${content}</div>`;
        }

        /* === عرض الفاتورة (محدّث مع رابط العميل) === */
        function renderViewBill() {
            const config = window.elementSdk?.config || defaultConfig;
            const bill = appState.currentBill;
            const clientName = bill.billCustomerId ? getCustomerName(bill.billCustomerId) : bill.billClientName;
            const customerId = bill.billCustomerId;
            return `
                <div class="fade-in">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 no-print">
                        <h1 class="text-2xl md:text-4xl font-bold" style="color: ${config.text_color};">عرض الفاتورة</h1>
                        <div class="flex flex-wrap gap-2">
                            <button onclick="appState.currentView = 'bills'; render();" class="px-4 py-2 bg-gray-300 rounded-lg font-semibold text-xs">رجوع</button>
                            <button onclick="editBill();" class="px-4 py-2 rounded-lg font-semibold text-white text-xs" style="background-color: ${config.accent_color};">✏️ تعديل</button>
                            <button onclick="printBill();" class="px-4 py-2 rounded-lg font-semibold text-white text-xs" style="background-color: ${config.primary_color};">🖨️ طباعة</button>
                            <button onclick="shareBill();" ${isLoading('sharing') ? 'disabled' : ''} class="px-4 py-2 bg-blue-500 rounded-lg font-semibold text-white text-xs flex items-center gap-1">${isLoading('sharing') ? '<div class="loading-spinner" style="width:14px;height:14px;border-width:2px;"></div>' : '📤'} مشاركة</button>
                            <button onclick="downloadBillPDF();" ${isLoading('downloading') ? 'disabled' : ''} class="px-4 py-2 bg-green-600 rounded-lg font-semibold text-white text-xs flex items-center gap-1">${isLoading('downloading') ? '<div class="loading-spinner" style="width:14px;height:14px;border-width:2px;"></div>' : '⬇️'} تنزيل</button>
                        </div>
                    </div>
                    <div id="view-bill-container" class="w-full">
                        <div id="printable-bill" class="card-shadow rounded-xl p-4 md:p-8 bg-white max-w-4xl mx-auto">
                            <div class="border-b-2 pb-6 mb-6" style="border-color: ${config.primary_color};">
                                <div class="print-header-grid">
                                    <div class="print-company text-right">
                                        <div class="flex items-center gap-3 mb-2">
                                            <div class="w-12 h-12 md:w-16 md:h-16 rounded-full flex items-center justify-center shrink-0" style="background: linear-gradient(135deg, ${config.primary_color}, ${config.secondary_color});"><span class="text-2xl md:text-3xl">👔</span></div>
                                            <div><h2 class="text-xl md:text-3xl font-bold">${escapeHtml(appState.companySettings.name)}</h2><p class="opacity-75 text-xs md:text-sm">فاتورة مبيعات</p></div>
                                        </div>
                                        <div class="space-y-1 text-sm md:text-base mt-2"><p>📞 ${escapeHtml(appState.companySettings.phone)}</p><p>📍 ${escapeHtml(appState.companySettings.address)}</p></div>
                                        ${clientName ? `<div class="mt-4 pt-3 border-t border-dashed" style="border-color: ${config.primary_color}33;"><p class="text-xs opacity-60 mb-1">العميل</p><p class="text-xl md:text-2xl font-bold" style="color: ${config.primary_color};">أ/ ${escapeHtml(clientName)}</p></div>` : ''}
                                    </div>
                                    <div class="print-invoice text-left">
                                        <div class="mb-4"><p class="text-xs md:text-sm opacity-75 mb-1">رقم الفاتورة</p><p class="text-2xl md:text-3xl font-bold" style="color: ${config.primary_color};">${bill.billNumber}</p></div>
                                        <div><p class="text-xs md:text-sm opacity-75 mb-1">التاريخ</p><p class="text-base md:text-lg font-semibold">${new Date(bill.billDate).toLocaleDateString('ar-SA', { year: 'numeric', month: 'long', day: 'numeric' })}</p></div>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-8 overflow-x-auto"><table class="mt-8 w-full min-w-[500px]"><thead><tr class="border-b-2" style="border-color: ${config.primary_color};"><th class="text-center py-2 px-2 font-bold text-sm">الإجمالي</th><th class="text-center py-2 px-2 font-bold text-sm">الكمية</th><th class="text-center py-2 px-2 font-bold text-sm">سعر الوحدة</th><th class="text-center py-2 px-2 font-bold text-sm">الفئة</th><th class="text-center py-2 px-2 font-bold text-sm">المقاس</th></tr></thead><tbody>${bill.items.map(item => `<tr class="border-b"><td class="py-2 px-2 text-center font-semibold text-sm">${item.total.toFixed(2)}</td><td class="py-2 px-2 text-center text-sm">${item.quantity.toFixed(2)}</td><td class="py-2 px-2 text-center text-sm">${item.unitPrice.toFixed(2)}</td><td class="py-2 px-2 text-center text-sm">${escapeHtml(item.category)}</td><td class="py-2 px-2 text-center text-sm">${item.size}</td></tr>`).join('')}</tbody></table></div>
                            <div class="border-t-2 pt-6" style="border-color: ${config.primary_color};"><div class="flex justify-between items-center"><span class="text-xl md:text-2xl font-bold">الإجمالي الكلي</span><span class="text-3xl md:text-4xl font-bold" style="color: ${config.accent_color};">${bill.billTotal.toFixed(2)} جنية</span></div></div>
                            <div class="mt-4 pt-4 border-t text-center opacity-75 text-sm"><p>${escapeHtml(appState.companySettings.footer)}</p></div>
                        </div>
                    </div>
                    ${customerId ? `<div class="max-w-4xl mx-auto mt-4 no-print"><button onclick="viewCustomerDetail('${customerId}');" class="text-sm font-semibold" style="color: ${config.primary_color};">← عرض ملف العميل</button></div>` : ''}
                </div>`;
        }

        /* === الإعدادات (بدون تغيير) === */
        function renderSettings() {
            const config = window.elementSdk?.config || defaultConfig;
            return `<div class="fade-in"><h1 class="text-3xl md:text-4xl font-bold mb-8" style="color: ${config.text_color};">الإعدادات</h1><div class="card-shadow rounded-xl p-6 bg-white max-w-2xl"><h2 class="text-xl font-bold mb-6">معلومات الشركة</h2><form onsubmit="saveSettings(event);" class="space-y-5"><div><label class="block text-sm font-semibold mb-2">اسم الشركة</label><input type="text" id="settingsName" value="${escapeHtml(appState.companySettings.name)}" required class="w-full px-4 py-3 border-2 rounded-lg text-sm" style="border-color: ${config.primary_color};"></div><div><label class="block text-sm font-semibold mb-2">رقم الهاتف</label><input type="text" id="settingsPhone" value="${escapeHtml(appState.companySettings.phone)}" required class="w-full px-4 py-3 border-2 rounded-lg text-sm" style="border-color: ${config.primary_color};"></div><div><label class="block text-sm font-semibold mb-2">العنوان</label><input type="text" id="settingsAddress" value="${escapeHtml(appState.companySettings.address)}" required class="w-full px-4 py-3 border-2 rounded-lg text-sm" style="border-color: ${config.primary_color};"></div><div><label class="block text-sm font-semibold mb-2">نص التذييل</label><input type="text" id="settingsFooter" value="${escapeHtml(appState.companySettings.footer)}" required class="w-full px-4 py-3 border-2 rounded-lg text-sm" style="border-color: ${config.primary_color};"></div><button type="submit" ${isLoading('saveSettings') ? 'disabled' : ''} class="w-full py-3 rounded-lg font-bold text-white text-base flex items-center justify-center gap-2" style="background-color: ${config.primary_color};">${isLoading('saveSettings') ? '<div class="loading-spinner"></div>' : ''}<span>حفظ الإعدادات</span></button></form></div></div>`;
        }

        /* === تهيئة عنصر التخصيص === */
        const element = {
            defaultConfig,
            onConfigChange: () => render(),
            mapToCapabilities: (config) => ({
                recolorables: [
                    { get: () => config.primary_color || defaultConfig.primary_color, set: (v) => { config.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); } },
                    { get: () => config.secondary_color || defaultConfig.secondary_color, set: (v) => { config.secondary_color = v; window.elementSdk.setConfig({ secondary_color: v }); } },
                    { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
                    { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
                    { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } }
                ],
                fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
                fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
            })
        };

        async function init() {
            if (window.elementSdk) await window.elementSdk.init(element);
            if (window.dataSdk) await window.dataSdk.init(dataHandler);
            render();
            // تركيز حقل البحث عند فتح القائمة المنسدلة
            setTimeout(() => {
                const searchEl = document.getElementById('custDropdownSearch');
                if (searchEl) searchEl.focus();
            }, 100);
        }
        init();
    </script>
</body>
</html>
