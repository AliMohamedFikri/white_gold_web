            /* Hide sidebar wrappers */

        }

<body class="h-full w-full">
    <div id="app" class="h-full w-full overflow-auto"></div>
    <script>
        // Mock SDK for local development
        if (!window.dataSdk) {
            window.dataSdk = {
                init: async (handler) => {
                    window._dataHandler = handler;
                    let data = JSON.parse(localStorage.getItem('app_data') || '[]');

                    // Seed initial data if empty
                    if (!data.some(d => d.type === 'pricingModel')) {
                        const SIZES = []; for (let i = 22; i <= 56; i += 2) SIZES.push(i);
                        // Map CSV sizes that are not in default generation (like 22, 24, etc.)
                        const createCategory = (name, priceMap) => ({ 
                            name, 
                            prices: SIZES.map(s => ({ 
                                size: s, 
                                price: priceMap[s] || 0 
                            })) 
                        });

                        const seedModels = [
                            {
                                name: "A",
                                data: [
                                    createCategory("سليب", { 26: 150, 28: 170, 30: 190, 32: 210, 34: 230, 36: 250, 38: 270, 40: 295, 42: 325, 44: 355, 46: 390, 48: 425, 50: 460, 52: 495, 54: 530, 56: 565 }),
                                    createCategory("نصف كم", { 22: 205, 24: 235, 26: 265, 28: 295, 30: 325, 32: 355, 34: 385, 36: 415, 38: 445, 40: 480, 42: 515, 44: 550, 46: 600, 48: 650, 50: 700, 52: 750, 54: 800, 56: 850 }),
                                    createCategory("شورت", { 26: 190, 28: 220, 30: 250, 32: 280, 34: 310, 36: 340, 38: 370, 40: 400, 42: 450, 44: 495, 46: 535, 48: 580, 50: 625, 52: 670, 54: 715, 56: 760 }),
                                    createCategory("سبور", { 22: 185, 24: 206, 26: 229, 28: 252, 30: 271, 32: 293, 34: 315, 36: 337, 38: 359, 40: 381, 42: 403, 44: 425, 46: 460, 48: 500, 50: 540, 52: 580, 54: 620, 56: 660 })
                                ]
                            },
                            {
                                name: "B",
                                data: [
                                    createCategory("سليب", { 44: 335, 46: 370, 48: 405, 50: 440, 52: 475, 54: 510, 56: 545 }),
                                    createCategory("نصف كم", { 44: 535, 46: 575, 48: 625, 50: 680, 52: 730, 54: 780, 56: 830 }),
                                    createCategory("شورت", { 44: 470, 46: 515, 48: 560, 50: 605, 52: 650, 54: 695, 56: 740 }),
                                    createCategory("سبور", { 44: 415, 46: 440, 48: 480, 50: 520, 52: 560, 54: 600, 56: 640 })
                                ]
                            },
                            {
                                name: "C",
                                data: [
                                    createCategory("سليب", { 26: 136, 28: 158, 30: 180, 32: 203, 34: 225, 36: 247, 38: 269, 40: 291, 42: 313, 44: 335, 46: 370, 48: 405, 50: 440, 52: 475, 54: 510, 56: 545 }),
                                    createCategory("نصف كم", { 22: 191, 24: 222, 26: 253, 28: 284, 30: 315, 32: 346, 34: 377, 36: 408, 38: 439, 40: 471, 42: 503, 44: 535, 46: 575, 48: 625, 50: 680, 52: 730, 54: 780, 56: 830 }),
                                    createCategory("شورت", { 26: 183, 28: 214, 30: 245, 32: 276, 34: 305, 36: 334, 38: 363, 40: 392, 42: 421, 44: 470, 46: 515, 48: 560, 50: 605, 52: 650, 54: 695, 56: 740 }),
                                    createCategory("سبور", { 22: 170, 24: 191, 26: 214, 28: 237, 30: 260, 32: 283, 34: 305, 36: 327, 38: 349, 40: 371, 42: 393, 44: 415, 46: 440, 48: 480, 50: 520, 52: 560, 54: 600, 56: 640 })
                                ]
                            },
                            {
                                name: "طقم دفاية",
                                data: [
                                    createCategory("كلسون", { 28: 25, 30: 30, 32: 35, 34: 40, 36: 45, 38: 50, 40: 55, 42: 60, 44: 65, 46: 85, 48: 90, 50: 95, 52: 100, 54: 105, 56: 110 }),
                                    createCategory("كم", { 28: 35, 30: 40, 32: 45, 34: 50, 36: 55, 38: 60, 40: 65, 42: 70, 44: 75, 46: 95, 48: 100, 50: 105, 52: 110, 54: 115, 56: 120 }),
                                    createCategory("المجموع", { 28: 60, 30: 70, 32: 80, 34: 90, 36: 100, 38: 110, 40: 120, 42: 130, 44: 140, 46: 180, 48: 190, 50: 200, 52: 210, 54: 220, 56: 230 })
                                ]
                            }
                        ];

                        data = [...data, ...seedModels.map((m, i) => ({
                            type: 'pricingModel',
                            pricingModelName: m.name,
                            pricingModelData: JSON.stringify(m.data),
                            createdAt: new Date().toISOString(),
                            __backendId: 'seed_' + i
                        }))];
                        localStorage.setItem('app_data', JSON.stringify(data));
                    }

                    handler.onDataChanged(data);
                    return { isOk: true };
                },
                create: async (item) => {
                    const data = JSON.parse(localStorage.getItem('app_data') || '[]');
                    const newItem = { ...item, __backendId: Date.now().toString() };
                    data.push(newItem);
                    localStorage.setItem('app_data', JSON.stringify(data));
                    if (window._dataHandler) window._dataHandler.onDataChanged(data);
                    return { isOk: true, id: newItem.__backendId };
                },
                update: async (item) => {
                    const data = JSON.parse(localStorage.getItem('app_data') || '[]');
                    const index = data.findIndex(d => d.__backendId === item.__backendId);
                    if (index >= 0) {
                        data[index] = item;
                        localStorage.setItem('app_data', JSON.stringify(data));
                        if (window._dataHandler) window._dataHandler.onDataChanged(data);
                        return { isOk: true };
                    }
                    return { isOk: false };
                },
                delete: async (item) => {
                    let data = JSON.parse(localStorage.getItem('app_data') || '[]');
                    data = data.filter(d => d.__backendId !== item.__backendId);
                    localStorage.setItem('app_data', JSON.stringify(data));
                    if (window._dataHandler) window._dataHandler.onDataChanged(data);
                    return { isOk: true };
                }
            };
        }

        // Configuration
        const defaultConfig = {
            company_name: "مصنع الذهب الأبيض للملابس",
            tagline: "جودة عالية وأسعار منافسة",
            hero_title: "أفضل مصنع لتصنيع الملابس",
            hero_subtitle: "نقدم لكم أجود أنواع الملابس بأحدث التصاميم",
            cta_button: "تواصل معنا",
            primary_color: "#667eea",
            secondary_color: "#764ba2",
            accent_color: "#48bb78",
            background_color: "#f7fafc",
            text_color: "#2d3748",
            font_family: "Cairo",
            font_size: 16
        };

        // App State
        let appState = {
            currentView: 'landing',
            isSidebarOpen: false,
            isMobileMenuOpen: false,
            isAuthenticated: false,
            currentUser: null,
            users: [], // Add this
            settings: null, // Add this
            companySettings: {
                name: "مصنع الذهب الأبيض للملابس",
                phone: "+201212813475",
                address: "العاشر من رمضان، الشرقية",
                footer: "شكراً لتعاملكم معنا"
            },
            pricingModels: [],
            bills: [],
            categories: ["سليب", "نصف كم", "شورت", "حماله", "كلسون", "كم", "المجموع"],
            selectedModel: null,
            editingModel: null,
            viewingModel: null, // Add this
            billItems: [],
            currentBill: null,
            loadingStates: {},
            editingBillId: null,
            lastBillInput: null,
            currentBillClientName: '',
            billStep: 'selectModel'
        };

        // Size generation (22 to 56, step 2)
        function generateSizes() {
            const sizes = [];
            for (let i = 22; i <= 56; i += 2) {
                sizes.push(i);
            }
            return sizes;
        }

        const SIZES = generateSizes();

        // Data Handler
        const dataHandler = {
            onDataChanged(data) {
                // Organize data by type
                appState.users = data.filter(d => d.type === 'user');

                if (appState.users.length > 0 && !appState.currentUser) {
                    appState.currentUser = appState.users[0];
                }

                const settings = data.find(d => d.type === 'settings');
                if (settings) {
                    appState.settings = settings;
                    appState.companySettings = {
                        name: settings.companyName || appState.companySettings.name,
                        phone: settings.companyPhone || appState.companySettings.phone,
                        address: settings.companyAddress || appState.companySettings.address,
                        footer: settings.companyFooter || appState.companySettings.footer
                    };
                }

                appState.pricingModels = data.filter(d => d.type === 'pricingModel').map(m => ({
                    ...m,
                    data: JSON.parse(m.pricingModelData)
                }));

                appState.bills = data.filter(d => d.type === 'bill').map(b => ({
                    ...b,
                    items: JSON.parse(b.billItems)
                }));

                render();
            }
        };
        // Authentication
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            setLoading('login', true);

            try {
                // First, check if we have loaded users
                const users = appState.users || [];
                const existingUser = users.find(u => u.username === username);

                if (existingUser) {
                    // In a real app, use proper password hashing
                    // For now, we'll do a basic comparison
                    if (existingUser.password === password) {
                        appState.isAuthenticated = true;
                        appState.currentUser = existingUser;
                        appState.currentView = 'dashboard';
                        render();
                        showToast('تم الدخول بنجاح', 'success');
                    } else {
                        showToast('كلمة المرور غير صحيحة', 'error');
                    }
                } else {
                    // Create new user
                    const userData = {
                        type: 'user',
                        username: username,
                        password: password, // In production, hash this
                        role: 'admin',
                        createdAt: new Date().toISOString()
                    };

                    const result = await window.dataSdk.create(userData);

                    if (result.isOk) {
                        appState.isAuthenticated = true;
                        appState.currentUser = userData;
                        appState.currentView = 'dashboard';
                        render();
                        showToast('تم إنشاء الحساب بنجاح', 'success');
                    } else {
                        showToast('حدث خطأ، الرجاء المحاولة مرة أخرى', 'error');
                    }
                }
            } catch (error) {
                showToast('حدث خطأ في النظام', 'error');
                console.error('Login error:', error);
            }

            setLoading('login', false);
        }

        function logout() {
            appState.isAuthenticated = false;
            appState.currentView = 'landing';
            render();
        }

        // Pricing Model Management
        async function createPricingModel(e) {
            e.preventDefault();
            const name = document.getElementById('modelName').value;
            if (!name.trim()) return showToast('الرجاء إدخال اسم النموذج', 'error');
            setLoading('createModel', true);
            const modelData = appState.categories.map(category => ({ name: category, prices: SIZES.map(size => ({ size, price: 0 })) }));
            const result = await window.dataSdk.create({ type: 'pricingModel', pricingModelName: name, pricingModelData: JSON.stringify(modelData), createdAt: new Date().toISOString() });
            if (result.isOk) { document.getElementById('modelName').value = ''; showToast('تم إنشاء النموذج بنجاح', 'success'); }
            else { showToast('حدث خطأ أثناء الإنشاء', 'error'); }
            setLoading('createModel', false);
        }

        async function updatePricingModel(model) {
            setLoading('updateModel', true);
            const result = await window.dataSdk.update({ ...model, pricingModelData: JSON.stringify(model.data) });
            if (result.isOk) { appState.editingModel = null; showToast('تم تحديث النموذج بنجاح', 'success'); }
            else { showToast('حدث خطأ أثناء التحديث', 'error'); }
            setLoading('updateModel', false);
        }

        async function deletePricingModel(model) {
            const modelId = model.__backendId;
            const confirmBtn = document.getElementById(`confirm-${modelId}`);
            if (confirmBtn && confirmBtn.style.display !== 'none') {
                setLoading(`delete-${modelId}`, true);
                const result = await window.dataSdk.delete(model);
                if (result.isOk) { showToast('تم حذف النموذج بنجاح', 'success'); appState.pricingModels = appState.pricingModels.filter(m => m.__backendId !== modelId); render(); }
                else { showToast('حدث خطأ أثناء الحذف', 'error'); }
                setLoading(`delete-${modelId}`, false);
            } else {
                const deleteBtn = document.getElementById(`delete-${modelId}`);
                if (deleteBtn) deleteBtn.style.display = 'none';
                if (confirmBtn) { confirmBtn.style.display = 'inline-flex'; setTimeout(() => { confirmBtn.style.display = 'none'; if (deleteBtn) deleteBtn.style.display = 'inline-flex'; }, 5000); }
            }
        }

        function editModel(model) { appState.editingModel = JSON.parse(JSON.stringify(model)); render(); }

        function updatePrice(categoryIndex, sizeIndex, price) { if (appState.editingModel) { appState.editingModel.data[categoryIndex].prices[sizeIndex].price = parseFloat(price) || 0; } }

        async function saveModelEdits() { if (appState.editingModel) updatePricingModel(appState.editingModel); }

        function cancelEdit() { appState.editingModel = null; render(); }

        function fillAllPrices() {
            const price = parseFloat(document.getElementById('quickFillPrice').value);
            if (!price || price <= 0) return showToast('الرجاء إدخال سعر صحيح', 'error');
            if (appState.editingModel) { appState.editingModel.data.forEach(cat => cat.prices.forEach(p => p.price = price)); render(); }
        }

        function clearAllPrices() { if (appState.editingModel) { appState.editingModel.data.forEach(cat => cat.prices.forEach(p => p.price = 0)); render(); } }

        async function duplicateModel(modelId) {
            const model = appState.pricingModels.find(m => m.__backendId === modelId);
            if (!model) return;
            setLoading('duplicateModel', true);
            const result = await window.dataSdk.create({ type: 'pricingModel', pricingModelName: `${model.pricingModelName} (نسخة)`, pricingModelData: model.pricingModelData, createdAt: new Date().toISOString() });
            showToast(result.isOk ? 'تم نسخ النموذج بنجاح' : 'حدث خطأ أثناء النسخ', result.isOk ? 'success' : 'error');
            setLoading('duplicateModel', false);
        }

        function viewModelDetails(modelId) {
            const model = appState.pricingModels.find(m => m.__backendId === modelId);
            if (model) { appState.viewingModel = model; appState.currentView = 'viewModel'; render(); }
        }

        // Billing
        function startNewBill() {
            appState.currentView = 'newBill';
            appState.billItems = [];
            appState.selectedModel = null;
            appState.editingBillId = null;
            appState.lastBillInput = null;
            appState.currentBillClientName = '';
            appState.billStep = 'selectModel';
            render();
        }

        function editBill() {
            if (!appState.currentBill) return;
            const bill = appState.currentBill;
            appState.editingBillId = bill.__backendId;
            appState.billItems = JSON.parse(JSON.stringify(bill.items));
            appState.currentBillClientName = bill.billClientName || '';
            appState.currentView = 'newBill';
            const model = appState.pricingModels.find(m => m.__backendId === bill.billModelId);
            if (model) appState.selectedModel = model;
            appState.billStep = 'items';
            render();
        }

        function selectModelForBill(modelId) {
            appState.selectedModel = appState.pricingModels.find(m => m.__backendId === modelId);
            appState.billStep = 'clientName';
            render();
        }

        function addBillItem() {
            const category = document.getElementById('billCategory').value;
            const size = parseInt(document.getElementById('billSize').value);
            const quantity = parseFloat(document.getElementById('billQuantity').value);
            if (!category || !size || !quantity) return showToast('الرجاء تعبئة جميع الحقول', 'error');
            const categoryData = appState.selectedModel.data.find(c => c.name === category);
            const priceData = categoryData.prices.find(p => p.size === size);
            const unitPrice = priceData.price;
            const total = unitPrice * quantity;
            appState.billItems.push({ category, size, quantity, unitPrice, total });
            const nextSize = size + 2 <= 56 ? size + 2 : size;
            appState.lastBillInput = { category, size: nextSize, quantity };
            render();
        }

        function removeBillItem(index) { appState.billItems.splice(index, 1); render(); }

        async function saveBill() {
            if (appState.billItems.length === 0) return showToast('الرجاء إضافة عناصر للفاتورة', 'error');
            setLoading('saveBill', true);
            const billTotal = appState.billItems.reduce((sum, item) => sum + item.total, 0);
            let result;
            if (appState.editingBillId) {
                const originalBill = appState.bills.find(b => b.__backendId === appState.editingBillId);
                result = await window.dataSdk.update({ ...originalBill, billItems: JSON.stringify(appState.billItems), billTotal, billClientName: appState.currentBillClientName });
            } else {
                const billNumber = `INV-${Date.now()}`;
                result = await window.dataSdk.create({ type: 'bill', billNumber, billDate: new Date().toISOString(), billModelId: appState.selectedModel.__backendId, billItems: JSON.stringify(appState.billItems), billTotal, billClientName: appState.currentBillClientName, createdAt: new Date().toISOString() });
            }
            if (result.isOk) {
                showToast(appState.editingBillId ? 'تم تحديث الفاتورة بنجاح' : 'تم حفظ الفاتورة بنجاح', 'success');
                cancelNewBill();

        function viewBill(bill) { appState.currentBill = bill; appState.currentView = 'viewBill'; render(); }

        function printBill() { window.print(); }

        async function shareBill() {
            const element = document.getElementById('printable-bill');
            const container = document.getElementById('view-bill-container');
            if (!container) { showToast('خطأ: لم يتم العثور على حاوية الفاتورة', 'error'); return; }
            setLoading('sharing', true);
            container.classList.add('pdf-capture-mode');
            const opt = { margin: 10, filename: `invoice_${appState.currentBill.billNumber}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
            try {
                const pdfBlob = await html2pdf().set(opt).from(element).outputPdf('blob');
                if (navigator.share && navigator.canShare && navigator.canShare({ files: [new File([pdfBlob], opt.filename, { type: 'application/pdf' })] })) {
                    const file = new File([pdfBlob], opt.filename, { type: 'application/pdf' });
                    await navigator.share({ title: `فاتورة ${appState.currentBill.billNumber}`, text: `فاتورة من ${appState.companySettings.name}`, files: [file] });
                    showToast('تم فتح نافذة المشاركة', 'success');
                } else {
                    const url = URL.createObjectURL(pdfBlob);
                    const a = document.createElement('a'); a.href = url; a.download = opt.filename; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
                    showToast('مشاركة الملفات غير مدعومة، تم تنزيل PDF بدلاً من ذلك', 'info');
                }
            } catch (error) {
                if (error.name !== 'AbortError') { console.error('PDF sharing error:', error); showToast('حدث خطأ أثناء إنشاء أو مشاركة PDF', 'error'); }
            } finally { container.classList.remove('pdf-capture-mode'); setLoading('sharing', false); }
        }

            const confirmDelete = document.getElementById(`confirm-bill-${bill.__backendId}`);
            if (confirmDelete && confirmDelete.style.display === 'inline-flex') {
                setLoading(`delete-bill-${bill.__backendId}`, true);
                const result = await window.dataSdk.delete(bill);
                if (result.isOk) { showToast('تم حذف الفاتورة بنجاح', 'success'); appState.currentView = 'bills'; }
                else { showToast('حدث خطأ أثناء الحذف', 'error'); }
                setLoading(`delete-bill-${bill.__backendId}`, false);

        }

                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")

                }`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {

                setTimeout(() => toast.remove(), 300);

async function importFromExcel(event) {
            const file = event.target.files[0];
            if (!file) return;
            setLoading('importExcel', true);
            try {
                const data = await file.arrayBuffer();
                const workbook = XLSX.read(data, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                const sheet = workbook.Sheets[sheetName];
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                if (rows.length < 2) throw new Error('الملف فارغ أو لا يحتوي على بيانات');
                let headerRowIndex = -1, sizeColIndex = -1;
                const categoryMap = new Map();
                for (let i = 0; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row) continue;
                    const sizeIdx = row.findIndex(cell => cell && cell.toString().trim() === 'المقاس');
                    if (sizeIdx !== -1) {
                        headerRowIndex = i; sizeColIndex = sizeIdx;
                        for (let j = 0; j < row.length; j++) {
                            if (j === sizeIdx) continue;
                            let catName = row[j]?.toString().trim();
                            if (!catName) continue;
                            if (catName === 'نصفكم') catName = 'نصف كم';
                            if (catName === 'سبور') catName = 'حماله';
                            categoryMap.set(j, catName);
                        }
                        break;
                    }
                }
                if (headerRowIndex === -1) throw new Error('لم يتم العثور على صف الرأس الذي يحتوي على "المقاس"');
                const modelData = [];
                const categoryNames = Array.from(categoryMap.values());
                for (let catName of categoryNames) {
                    modelData.push({ name: catName, prices: SIZES.map(s => ({ size: s, price: 0 })) });
                }
                for (let i = headerRowIndex + 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row || row.length === 0) continue;
                    const sizeCell = row[sizeColIndex];
                    if (sizeCell === undefined || sizeCell === null) continue;
                    const size = parseInt(sizeCell);
                    if (isNaN(size) || !SIZES.includes(size)) continue;
                    for (let [colIdx, catName] of categoryMap.entries()) {
                        const priceCell = row[colIdx];
                        if (priceCell === undefined || priceCell === null || priceCell === '------' || priceCell === '') continue;
                        const price = parseFloat(priceCell);
                        if (isNaN(price)) continue;
                        const catData = modelData.find(c => c.name === catName);
                        if (catData) { const priceEntry = catData.prices.find(p => p.size === size); if (priceEntry) priceEntry.price = price; }
                    }
                }
                let modelName = file.name.replace(/\.[^/.]+$/, "");
                modelName = prompt("أدخل اسم النموذج:", modelName);
                if (!modelName || !modelName.trim()) { setLoading('importExcel', false); return; }
                const result = await window.dataSdk.create({ type: 'pricingModel', pricingModelName: modelName.trim(), pricingModelData: JSON.stringify(modelData), createdAt: new Date().toISOString() });
                showToast(result.isOk ? 'تم استيراد النموذج بنجاح' : 'حدث خطأ أثناء حفظ النموذج', result.isOk ? 'success' : 'error');
            } catch (err) {
                console.error(err);
                showToast('خطأ في قراءة الملف: ' + err.message, 'error');
            } finally {
                setLoading('importExcel', false);
                event.target.value = '';
                render();
            }
        }

            finally { container.classList.remove('pdf-capture-mode'); setLoading('downloading', false); }
        }
